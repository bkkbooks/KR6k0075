front:
  text: 佛說目連五百問戒律中輕重事經序聞夫五百問經者廼末世持律之要輔也良以眾生雖具覺性由三毒而發於身口根塵互縛生六識而造於七支有作業垢現前無作靈明隱昧故致輪迴莫知已矣是以如來出現唯為一事開示眾生佛之知見但由眾生根鈍障重作諸過非不獲暢於本懷且開權乘之教滅業必假尸羅斷惑須憑禪智遂往鹿苑而說三乘之三藏又於龍城而制四果之四分七眾通該二都總攝輕重皆有開遮止作咸資定慧五篇七眾周圓三千八萬具足時有大權尊者名曰目連遠惟末世比丘無慚無愧輕慢佛語犯眾學戒雜用三寶物當墮何處於所問事數有五百一一諮詢願為演說佛大悲心念其現未二眾有習有漏俾尊聖禁明篇聚因於所答諸戒分十七事犯其六聚墮泥犁中如六天壽條條決了熟覧其文者識因果分明而不妄謂理無差錯研窮其義者知受戒如法而不謬稱普利圓融分五戒十戒是輕是重了歲坐懺悔事除不除詳明開遮之正制深解止作之精嚴非惟廣闢緇流之見亦生淨信之心是知離業妙行輔律良規更無過於斯矣故云持律護茲而佐始能謹守浮囊有智慧便得第一道也然此問戒慨古德之未疏慮後學之多違近雖數解流通義猶隱略令好尚者得益不深由是清凉搦管覧於經律若文義相應者標其問下逮住都門之愍忠寺開演律學幾歷寒暑稿謄數次期自觀覧有弟子輩念欲刊行冀稟持者普修梵行遂命梓刻板以廣傳通所願見聞解義共為出世之良因隨喜信行永作菩提之善種夫然者豈淺小之功哉天啟七年孟夏佛誕日傳講毗尼賜紫沙門永海謹序佛說目連五百問戒律中輕重事經釋目次卷上自序五篇事品第一問佛品第二問法事品第三結界法品第四問歲坐品第五度人事品第六問受戒品第七受施事品第八疾病事品第九死亡事品第十卷下問三衣事品第十一鉢事品第十二襍事品第十三三自歸事品第十四問五戒事品第十五問十戒事品第十六問沙彌品第十七歲坐竟懺悔文此九十日中所犯事通威儀佛說目連五百問戒律中輕重事經釋目次終
