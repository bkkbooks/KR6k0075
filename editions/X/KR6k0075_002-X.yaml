body:
  text: 失譯人名今附東晉錄明愍忠寺傳講毗尼比丘永海述十一三衣事問三衣事品第十一釋三者五條七條二十五條也衣者梵語震越此飜衣服衣依也所依以庇寒暑也又上曰衣隱也下曰裳障也所以隱形自障也大論云釋子受禁戒是其性剃髮割截染衣是其相智論釋云行者少欲知足衣趣盖形不多不少故受三衣白衣求樂故多畜種種衣或有外道苦行故裸形無恥是故佛弟子捨於二邊處乎中道制三衣也名者言離塵服斷六塵故又名蓮華服服者離著故亦間色服以青黑木蘭如法所成故業疏云聽以刀截成沙門衣不為怨賊所剝故章服儀云條堤之相事等田疇之畦貯水而養嘉苗譬服此衣生功德也安陀會此云中宿衣言於宿睡近身住也南山云五條名下衣從用云院內行道雜作衣多羅僧此云上著衣言加於安陀會之上也又名中價衣從用云入眾時衣禮誦齋講時著也僧伽黎此云合又云重言割之合成而重疊故今以義譯名雜碎時衣以條數多故從用云入王宮聚落乞食說法時著也又戒壇圖經云五條下衣斷貪身也七條中衣斷嗔口也大衣上衣斷痴心也故薩婆多云為五意故障寒熱除無慚愧入聚落在道行生善威儀清淨又律云此三衣乃賢聖沙門之幖幟若懷抱於結使不應披袈裟既云沙門幖幟則知定非在家人著也故法華偈云剃除鬚髮而被法服華嚴淨行云剃除鬚髮偈後方云著袈裟時至梵網經云一切國土中國人所著衣服比丘皆應與俗服有異則知在家受戒如常之服也若在家修懺者應如輔行及方等經云三衣有二種若割截即大僧所著之衣若單縫者即在家修懺之衣幸願傳法者覧此教而遵佛語是名報佛恩也事即比丘受捨三衣等云為之事也問三衣事浣要須捨否答須捨若不捨犯捨墮當施與人還乃得更受釋浣者除垢也捨者展轉施也謂比丘三衣事浣洗除垢可要須捨否佛答須捨以浣垢即同新造故捨文云大德一心念此是我某甲比丘法衣事浣捨與大德為展轉淨故一說彼受者言長老一心念汝有是衣事浣為浣故施我我今受之汝施與誰曰施與某甲彼云長老一心念汝有是衣事浣為浣故施與我我已受之汝與某甲是衣某甲已有汝為某甲故善護持著用隨因緣若不捨犯捨墮應當施與人還時乃得更受此更受者事同新得故問三衣盡得條成否答大衣得中衣小衣不得釋謂比丘所持三衣為是大衣二十五條為復三衣盡得二十五條成否佛答言大衣得者此衣條及長多而短少者有所表故以彰意地微細習惑多故亦顯受戒持衣時聖增凡減為出三界二十五有之初因故若中衣條及長多而短少者表口業四失次於意業顯受戒持衣時聖增凡減為出七趣之初因故此小衣條及長多而短少者表身業三失次於口業四失顯受戒持衣時聖增凡減為出五道之初因故如是中衣小衣條及短長以別大衣等級之用故云不得問小衣得著燒香上講否答無中衣得若不近身淨潔亦得釋謂比丘燒香供佛上堂聽講應著七衣若無中衣小衣得著燒香上講否佛答三衣之用各別不得雜用除無中衣者得意顯有中衣不得若小衣不近身淨潔亦得著也問浣衣出帛得用米粘否答不得犯捨墮日日從沙彌白衣乃得著釋謂比丘浣洗衣垢披出布帛得用米粘汁入帛否佛答不得者以初作時得用為却塵土故若浣衣垢不得用恐忘壞色貪其好故若故用犯捨墮日日下明故違之責令念佛教之不忘也言故用者日日從沙彌代白衣人受乃得著用不開自取俾敬佛制也問三衣應施裏否答施裏不施亦得釋施設也裏者對表而言以大衣須四層七衣亦四五衣二層故謂比丘三衣之表田相葉孔是其定制此衣表之內層為復定同衣表之制應施裏之不同耶佛答若中邊之土正像之時適其所宜施裏應得不施者亦得也以衣表是定制故問大衣得著上講禮拜否答無中衣得釋謂上堂聽講禮拜三尊應著中衣若無七條所持大衣可得上講禮拜否佛答若無中衣得著大衣問三衣得用生絹作否答一切生絹衣不見身者得著釋智論云千佛相傳十三條麤布僧伽黎是萬代之制也言比丘三衣為定用布可得用生絹作否佛答若一切生絹衣不見身者得著此乃權時故開得著意顯見身者不得有貪染意故若大乘事按律則云獸毛蚕口害物傷慈縱得已成斬壞塗埵又經云比丘服其身分皆為彼緣如人食其地中百穀足不離地故知真解脫人身不服著當以廉踈麻布為其體青黑木蘭染其色是遵佛制也問比丘瞋忿自壞衣鉢錫杖犯何事答瞋惱自壞三衣鉢犯捨墮壞錫杖犯捨墮壞他物計錢犯事釋瞋忿者言瞋心忿怒也壞毀也梵語隙棄羅此云錫杖錫者輕也由持是杖漸輕煩惱出於三界故曰輕也又明也言持杖之人獲智慧明故謂比丘瞋忿自壞三衣鉢杖犯何篇事佛答若自壞衣鉢犯捨墮壞杖犯捨墮以比丘持戒無欲而懷瞋恚甚不可也況慢佛語而壞道具故若壞他物計錢多少犯重輕故問三衣得借人否答不得出界經宿若同界內得不限日數釋謂比丘三衣不離於身如鳥羽故可得借與他人用否佛答不得出大界經宿犯離衣過若同界內得借不以限日數也問入聚落中不被大衣犯何事答著肩上去不犯若僧使或為病人持去不犯釋謂比丘入聚落中應著大衣若不被大衣犯何篇事佛答若比丘非食時乞食而餘緣入者雖不身被著身上去不犯意顯乞食必著若不著者犯越法罪若為僧所使及為病人皆持去不犯若不持去亦越法罪問三衣破補得受須復施他人耶答破容猫子脚便應施人人還乃得補受若先補後施人亦得釋補者縫也施人者大德一心念此是我某甲比丘某衣破補捨與大德為展轉淨故一說彼受者言長老一心念汝有是衣破補為補故施與我我今受之汝施與誰曰施與某甲彼云長老一心念汝有是衣破補為補故施與我我已受之汝與某甲是衣某甲已有汝為某甲故善護持著隨因緣謂比丘衣破壞補便得受須復施他人耶佛答衣破容猫子脚便應施人人還乃得補受義同捨墮衣之新得若先補後施亦得十二鉢事鉢事品第十二釋梵語鉢多羅此云應量器體色量三皆應法故體者泥及鐵也色者熏作黑赤色或孔咽色鳩鴿色也量者南山云準唐斗上鉢一斗下鉢五升中則可知原佛制意世人活命不離四邪若欲斷除邪妄及乞食授受不親須一鉢以支命律云比丘持木鉢佛言不應持如是鉢此是外道法事者即持失等諸云為事也問鉢云何失答若緣缺若穿穴若裂若油不捨盡是失緣缺穿穴不可復持裂者綴己施人人還更受油不捨亦爾若棄出界經宿不失釋謂比丘之鉢乃常用之器云何為失受持耶佛答若鉢四緣有缺若鉢底有穿孔穴若鉢有裂縫若鉢盛油不捨者盡皆失受持也唯緣缺穿穴不可復持若裂者綴己施人文云大德一心念此是我某比丘鉢裂捨與大德為展轉淨故一說彼受者言長老一心念汝有是鉢裂為綴故施與我我今受之汝施與誰曰某甲彼云長老一心念汝有是鉢裂為綴故施與我我已受之汝與某甲是鉢某甲已有汝為某甲故善護持之隨因緣人還更受持油不捨亦爾者因緣缺等爾此影捨者同裂綴等爾若棄鉢出界經宿不失受持但犯離宿過也又罷道死轉根不捨穿亦名失受持若穿如粟米大以鐵屑補得受持問鉢得合覆著壁上否答若巾裹得合淨處著若囊或懸壁好不得覆著壁上昔六群比丘覆鉢壁上墮地即破佛因此制戒自今已後不得覆鉢壁上覆鉢壁上者犯捨墮地者犯捨墮釋謂比丘用鉢食已護持鉢時為當巾裹囊懸合於淨處可得合覆著壁上否佛答若護持鉢以巾裹得合著淨處若囊盛或懸於壁好唯不得合覆鉢於壁上昔六群下佛引覆鉢之事結戒犯捨墮置地者亦捨墮問比丘早起得用鉢食不用有何咎也答一切食皆應用鉢若一日都不用犯墮釋謂比丘之鉢既為助道要緣除邪正務為是中食定制為當次制早起之粥可得用鉢受食若早不用有何咎也佛答以比丘學道之行無論早中若大食小食正食不正食至一切食啖皆應用鉢以異俗治習順道興悲故若一日都不用犯墮以違受鉢時自云常用受食之妄語故意含早中二時或緣事有妨併為遮異邪之非一時不用無犯故宣師威儀云設二時中非故意不用者聽淨水浴鉢也問比丘食飯欲盡得側鉢括取飯否答得釋比丘食飯欲盡有餘飯時為是正捧括取可得側鉢括取飯否佛答得者以飯盡遺餘知慚愧故若以指略舌䑛非儀不得問食後已訖更噉餘菓手得離鉢否答得若食未訖亦得暫離釋謂比丘既一切食皆用鉢者若食後澡潄已訖更噉餘菓手可得離鉢食否佛答得者以五嚼食手得離鉢若設受五噉未潄訖時亦得暫離非都不用故問比丘食鉢要當擎得放地否答要當擎故地亦不犯戒釋謂比丘受食敷坐展巾左手捧鉢右手扶緣五觀三匙如法威儀若用食之鉢必要當擎異於世人可得放地否佛答以受食威儀須要當擎若放地少歇亦不犯戒也問比丘以器盛飯停著鉢中得互用鉢食否答不得犯捨墮釋器者梵語犍茲此云隨鉢器言隨助鉢之用也或俗用器皿謂比丘用鉢事理相應若慮煩苟簡以器盛飯停著鉢中且不違戒而省煩可得互用鉢食否佛答不得者以非法非毗尼非佛所教故若用犯捨墮問鉢得炊作食否答不得炊犯捨墮釋謂比丘不自熟食以持鉢福利眾生之意也或行矌野無人處此鉢可得炊爨作食否佛答不得者以僧有厨院淨食之釜故若故炊者犯捨墮十三襍事問襍事品第十三釋襍者參錯也言所問比丘等事三寶等事參雜錯乱非同前品條然一貫故又集也以所問比丘等諸事集聚相合故也問比丘或被劫盜物未出界主見本物不知諸物得取否答得取即用九十事中寶相似者當先作念若有人認者不得取無認者白眾得取若無眾作界內物取不以為己取物釋劫者公自而取曰劫隱然不與取曰盜謂比丘於界內或被劫盜衣物而所劫物未出界外其失物主又見所失本物已作地物想不知諸物可得取否佛答得取者以雖作失想未出於界故即用下明取物法也言比丘見所失物欲取時即用律本九十事中寶相似者以彼文中有除僧伽藍中及寶莊飾具開捉之事當先作念若有人認者不得取無人認者當白眾可得取之若無眾白者作界內僧物取不以為己物取以初時作失物之想故問眾僧打犍椎食而限外僧來不與食犯何事答便是失利得突吉羅釋限止也謂界內眾僧打犍椎集僧而食又限止界外僧來不與食者犯何事佛答便是失其善利以但知有食利故又云如來白毫之福分為百分以一分供三千界內盡是出家人受用不盡況外來僧限不與之故云失利所以得突吉羅之惡作也問先比丘教化百人齋長一人以上應受否教化比丘有犯否答打犍椎食應受教化者無犯所以爾者打犍椎謂僧多過失犍椎法要作意請四方僧僧來若多若少一切分財飲食其於無咎釋謂先有勸率比丘教化檀越作百人之齋後界內取食比丘見齋長多一人以上可應受否教化比丘有犯否佛答謂後取食者若打犍椎食應受教化者無犯所以爾者盖打犍椎食者謂僧多私取過失之故其犍椎之法要作意請四方僧僧來若多若少一切分財飲食得受其於教化者無咎問比丘教化白衣供養眾僧若有外人來乞索得與一升五升否答不得若知非法故與過五錢犯棄若白眾聽得釋謂比丘教化白衣供養眾僧若有外一住處人來乞索一升五升教化比丘可得與一升五升否佛答不得者以教化人供此界僧不宜與彼即犯盜故若知僧物與外人者是非法而故與過五錢犯棄若勸率比丘白於眾僧聽許得與問主人供養諸僧長請一日百錢用五十自供殘者得餘用否答打犍椎得若無衣鉢不打犍椎眾和合得減用若自損施客僧最善釋長請者言恒長之請非四月之限也謂施主人供養諸僧長請一日百錢但用五十自供殘者可得餘用否佛答若殘錢欲餘時用須打犍椎得以無私取之咎若或界內眾僧無衣鉢不打犍椎而眾和合得減用以充衣鉢之事若自界內減損施客僧者最善問主人請比丘十日供十日食裁作三五日好食犯何事答不犯但不得更索索犯捨墮若不滿十日去亦犯捨墮釋謂施主人請比丘十日之供而比丘以十日之食作三五日好食犯何事佛答不犯者以所受供盡故但不得更索餘七五日之食若索犯捨墮以有貪味妄心故雖爾不索亦須足十日去滿彼請期故若不滿十日去者亦犯捨墮亦有貪味妄言故問主人請供十日食自裁作一月食得否答打犍椎得若不打犍椎僧有出去者若不施後人食後人食己分盡食他分一飽犯棄不飽犯捨墮釋謂施主人請僧供十日之食而比丘自裁作一月之食得否佛答若以旬日食作一月食者須打犍椎得也若以少時而作多時不打犍椎四方僧弗集恐受十日請僧出界外去者犯於盜故設有僧去食當如何此食應施後人若不施後人又食後人食十日己分食盡食他後人分一飽犯棄不飽犯捨墮飽者言滿足亦快意也問父母兄弟破壞得乞物贖否答得但不得稱己須乞父母兄弟得若用訖有長不得自入還屬所贖者若語聽用犯墮不聽用而用犯棄釋謂比丘父母兄弟負人物或被主破壞分離已屬其主而比丘可得乞化錢物贖之否佛答得者以孝念慈心故若乞物時但不得己須指乞父母兄弟得若贖用訖有長多者不得自入還屬所贖者以僧不用父母等物故若父母語聽用者犯墮以犯妄語故不聽用而用犯棄以同得上人法求利故問至酤酒家得乞財否無事得坐語否答酤酒門一切不得入若入犯墮更有餘門得入若請比丘會當問能受一日戒否若言能與受得住若不受但能一日不酤酒得住屠家亦爾釋酤者貨賣之名也謂比丘行乞至於酤酒家可得乞求財物否若無請召因緣事可得坐止語話否答若行乞至彼欲乞財諸事宜於門前凡一切事不得入以遠防昏乱之端故若故入犯墮除有餘門得入者以無昏乱之事故若彼酒家請比丘善會即當問云汝能受一日戒否若言能受與受得住若不能受但能一日不酤酒得任屠家亦爾例同酒家故問勸人飲酒犯何事答強勸不飲犯突吉羅若飲犯墮釋謂比丘之行應勸人明達之慧以為修進正緣若勸人飲酒而為損害之本犯何篇事佛答若比丘強勸他人飲酒彼不飲者犯突吉羅若飲犯墮問道人寄白衣物此人過期不來與餘比丘得取否答不得取若活是有主物若死是四方僧物釋寄附也謂比丘道人寄附白衣物言某時來取此道人過其所期不來而白衣得與餘比丘餘比丘得取否佛答不得取者以雖過期餘人不得取何者若彼本寄人活者是有主物取犯捨墮若彼死者是四方僧物取者犯棄問比丘暮得捉火行否答曰冬得夏然燭亦得若把火犯墮釋暮晚也謂比丘於暮晚時界中有事得火行否答曰冬時得以嚴寒際無有蚊虫故以顯夏時多虫捉火行來有損傷故若然燭於籠中亦得若把火損傷犯墮例三篇中故斷眾生命故問本物直一疋因行至他方賣得五三疋可取否答不得取犯捨墮釋疋者四丈也謂比丘本物直於一疋因事行至他方賣得五三疋非故販事有方便現前二事求利過此長多物可得取否答不得取者以是商賈事故若取犯捨墮問一切戲負他物不償犯何事答戲取物及與盡犯捨墮釋戲嬉也言戲弄也負者言受貸不償也償還也謂比丘一切戲負他人之物而不償還非不與取犯何篇事佛答若比丘戲取及假與皆應償之若不償之犯捨墮以慢心而取及貪念故問比丘甞食得食否答不得知而食犯捨墮前甞食人亦犯墮若不即懺其罪日增昔有一執事比丘恒知處分當作飲食常手拄器言取是用是日日常爾不懺命終後墮餓鬼中有一比丘無著於夜上廁聞呻喚聲問汝是誰答言我是餓鬼問本作何行墮餓鬼中答於此寺中為僧執事問汝本精進何由墮餓鬼中答不淨食與眾僧無著問云何不淨答眾僧有種種瓮器盛食見以指拄器教取是用是物犯墮三說戒不悔轉至重以是故墮餓鬼中兩手擘𦚾裂皮破肉搏喉吹𠹀問何以擘𦚾答蟲噉身痛故何以搏喉吹𠹀以口中虫故復問何以呻喚答餓極欲死故問欲食何物答意欲食糞而不能得問何故不得答以諸餓鬼推排不能前無著言我知柰何鬼言願眾僧見為呪願答可爾無著即還向眾說彼人墮餓鬼眾僧問本行精進何墮惡趣答本以不淨食與僧而不悔故願與呪願便得食糞不復呻喚以是證知故大比丘不得手造飲食及拄觸僧器物若非僧器手受得行與僧無犯釋甞試也言探味也擘裂也𠹀同噴也鬼歸也故古人以死人為歸人又畏也威也謂虗怯多畏亦令他人畏其威故謂彼餓鬼恒從他人希求飲食以活性命也謂知食比丘甞試調和味食置之餘比丘可得食否佛答不得者以僧未食故若知未食而食犯捨墮前甞食人亦犯墮此二人應懺若不即懺其罪日增以至重也昔有下文為二初引證有四初不懺之報自昔有一執事比丘乃至墮餓鬼中二不懺至重自有一比丘無著於夜上廁至搏喉吹𠹀三擘𦚾食糞自問何以擘𦚾至推排不能前四求願不喚自無著言我知柰何至不復呻喚二結答自以是證知至觸僧器物若非僧器等明無犯意也問師令弟子販賣作諸非法得遠離師否答不得捨去有四因緣應住一者與法與食不與衣鉢應住二者與法與衣鉢不與食應住三者與法衣鉢與食應住四者與法不與衣鉢不與食應住若師都不與法不與衣鉢食應去釋販者方便求利也賣者現前求利也非法者言所為作皆非如法之事謂師範之體應教徒以道若不誨出家事業而反令弟子販賣作諸非法是不善業可得遠離師否佛答得捨去者以非出世之法故有四因緣應住者明去住之意也一者與法食不與衣鉢甘貧淡住二者與法衣鉢不與食甘乞食住三者與法衣鉢食感恩盡命住四者與法不與衣鉢食甘淡薄行乞而住若師都無法衣鉢食與者無有利益應去也況令販賣故問夫淨何者須淨淨有幾事答菓菜須刀手火淨惟穀米須火淨菓已淨子無苦釋淨者潔也按律明比丘所食勿啖生氣生命須淨潔而食良由比丘不淨菓而食外道譏嫌言比丘無慈心此菓有命云何食生命也又為啖生氣故遂制淨已方可食之盖佛所制食之淨事若先淨後食而所食者多何者須淨此淨共有幾事耶答謂一切瓜菓等物先以火燒煑令熟方食名為火淨故律云以火觸著也又以刀其皮核方食名為刀淨故律云以刀損壞也又以爪甲去其皮殻方食名為爪淨故律云以爪甲傷損也又以自䔍乾不堪為種方食名為䔍乾淨故律云自䔍自乾不堪為種也又一切瓜菓等物因鳥殘損比丘可食名為鳥淨故律云鳥嘴殘是五種淨也諸淨物中唯穀米須火淨若菓已淨子無苦也問禮拜得著靴鞋履否答淨者得釋梵語富羅此云短靿靴鞋履者皮革屣也律云五皮不應用餘同類亦然若患痔病時熊皮履應著言淨無垢污也象馬師子虎豹五皮用者犯罪若比丘禮拜三尊應脫革屣可得著靴鞋履否佛答淨者得以不淨脚履登殿塔者犯惡作罪若如法禮敬三尊之儀必除帽偏袒右肩脫革屣除病緣耳問𦘕作旛華賣得物犯何事答犯捨墮釋𦘕者掛也以五色掛物像也旛反也言反惡為善也華荂榮也言以五色𦘕掛旛上華敷之像也謂比丘𦘕作旛上之華賣求利得物此借善求利不同販賣犯何篇事耶答犯捨墮者以貪心慢佛語故問教他販賣犯何事答犯捨墮釋教他者言教誨他人邪業活命也謂比丘應修淨命出離之行亦以斯而誨人而反教他人販賣犯何等事佛答犯捨墮者以慢佛戒示人繫縛因故若教人為販賣亦然問比丘畜奴牛驢馬犯何事答犯捨墮不悔轉增釋畜者養也奴者走使也言比丘畜奴難生卑下心過日藏分云於我法中假令如法始從一人至四人不聽受奴也牛馬者此該六畜也此是養生求利過四分云比丘畜猫狗乃至眾鳥並不得畜如是奴牛等若滿五人得受謂比丘為佛法事宜受奴牛驢馬使用若無佛法事畜奴牛驢馬犯何事也佛答犯捨墮者以律云五人今自畜犯過故其罪當悔若不懺悔經三說戒轉增至重也問比丘授人為道未度得食僧食否答白僧得不白犯墮釋授字約義無才手為是以領納人為求道故謂比丘受人為道未向僧中乞度人法猶是俗人既無戒行可得食僧伽之食否佛答若比丘受人為道應白僧得食者白僧者大德僧聽我某甲求眾僧乞度人授具戒願僧聽我比丘度人授具戒慈愍故三說僧觀此人堪教授與度人法白二羯磨白言大德僧聽此某甲比丘今從眾僧乞度人授具足戒若僧時到僧忍聽僧今與某甲比丘度人授具足戒白如是大德僧聽此某甲比丘今從眾僧乞度人授具足戒僧今與某甲比丘度人授具足戒誰諸長老忍僧與某甲比丘度人授具足戒者默然誰不忍者說僧已忍與某甲比丘度人授具足戒竟僧忍默然故是事如是持不白者犯墮以不信語故問為僧乞食道路己身得食否答若去時先白僧僧聽好若不白還白聽亦好若不聽還酧若不償犯重釋謂比丘為僧乞化飲食行於道路無食之處己身可得食所為僧伽之食否佛答若為僧去乞之時應先白僧己身欲食僧食僧若聽食者好若去時不白還時白聽者亦好若不聽還當酧之若不償之犯重即是不與取故問他人持食具寄屋中經宿有犯否答不犯釋謂他比丘人持食具寄此比丘屋中經宿有犯否佛答不犯以不自犯殘宿食故問續明油一升二升得著自房中否答得釋謂檀越續供佛前光明之油若一升或二升既是佛物應安佛地可得著己房中否佛答得者以侍佛比丘便於增明非同用於佛物故問藥酒得著自房中否答病得七日釋謂比丘不得入於酒家遠防昏乱之端若為病調制藥酒可得著於自房中否答云病得七日以律制七日藥為經宿服故雖有酒名亦是藥故問都不用楊枝有犯否答犯捨墮釋用楊枝者以律制有染苾蒭不應禮拜等謂比丘清晨中時都不用楊枝有所犯否答犯捨墮罪以在家八戒尚云晨嚼齒木澡潄清淨況於出家都不用之故犯罪也問未曉得用楊枝否答明星出後得用釋謂比丘晨嚼齒木以除其染而天未曉可得用楊枝否佛答若及明星出後得用以不犯非時戒故問中食後口得用楊枝否答得用若不用純灰皂莢汁都不用犯墮過中亦犯墮中後除藥一切草木有形之味不得入口犯捨墮釋謂比丘中食之後潄口除染其事非一若楊枝純灰皂莢汁或不具時可得但用楊枝否佛答得用若不用純灰皂莢及楊枝都不用犯墮過中亦犯墮以犯非時戒故盖中後唯除藥味入口以調四大故除藥之外凡一切草木有形之味皆不得入口無益於己故若入口者犯捨墮以違佛教故問若無楊枝口得用一切餘木否答盡得釋謂比丘食後不用楊枝犯過若其住處或無楊枝口得用一切餘木否佛答盡得者以但取其除染故問貧乏得入市乞否答中前得中後不得亦不得乞錢當將一白衣沙彌亦不得釋謂比丘進道必具助緣貧乏衣鉢可得入市乞化否佛答若乞道具須在中前以是利化時故中後不得以費自利事故亦不得乞錢以生譏嫌故但言乞其某事可爾若必欲乞錢當將一白衣執事人代持置辦若沙彌亦不得持以與彼戒相違故問人捉比丘賣得走否答初時得經主不得釋謂比丘物被劫未出界得取或被強人捉持比丘而賣齊何時何處得走脫否佛答若比丘被人捉賣初時之處得走若後時經主不得以屬他人之財故若走即盜事而論故問比丘戲得物得作食請比丘得食否答不得犯捨墮釋謂比丘邪命之食不宜用之若戲嬉得物非邪命而造飲食請比丘此所請者可得食否佛答不得者以雖非邪命亦非正命攝故若食者犯捨墮問比丘尼不精進可勸罷道否答無此理釋謂比丘之任教授尼眾云精勤行道謹慎莫放逸若比丘尼不精進善品比丘可得勸其罷道否答無此理者良以尼若犯重方不共住然雖不精修善行持守戒學猶為福田相也不無二利之益若勸罷道者得吐羅底罪問合藥施人而不知裁節服者死犯何事答好心與無犯惡心與犯重釋謂律制比丘淨戒不得合和湯藥若比丘合和湯藥施濟於人而不知裁製藥性節驗君臣加減分量令所服者身死犯何篇事佛答若服者死是好心與無犯重也不無輕罪故律云佛言若比丘不解作藥令人得生與藥而死得突吉羅是故當來比丘勿作醫師作者犯突吉羅若惡心與犯重以貪利誤傷人命故問比丘或十臘五臘竟不誦戒犯何事答若不誦戒食人信施日日犯盜若先不知猶得懺悔釋誦戒者乃如來之制千佛恒規令僧長養善法淨除破戒之過是如法住若比丘故違佛語或十臘五臘而竟不誦戒犯何篇事佛答若不誦戒食人信施者日日犯盜以無戒德而消故是以經云非沙門者自言我是沙門劫四輩物故又母論云若出家至五臘要誦戒使利若根鈍至百臘亦應誦之若故不誦若先誦後時廢忘若復根鈍不能誦得者此等二人有四種過失一者不得畜弟子二者不得離依止三者不得作和尚四者不得作阿闍黎是名不誦戒者罪若先十臘五臘不知誦戒者猶得懺悔盜罪問一切鬼神屋可寄宿否答在路得有觸擾意住犯墮釋謂比丘所為是佛教誡經云若天帝等皆事敬我之弟子我之弟子不得事敬彼天鬼神夫然者凡一切鬼神屋比丘可得寄宿歇否佛答若比丘在路行得宿雖在路行值鬼神屋有觸擾意住犯墮與故惱他比丘戒同故意顯住處者不得問比丘噉生肉犯何事答犯墮釋謂比丘噉生肉犯何事佛答犯墮者以即同故殺眾生故又三十二問云九肉突吉羅此彼不同者彼開權之始若人大之初故若楞嚴楞伽涅槃等廣明其非皆永斷故問二男行欲不竟犯何事答犯決斷釋謂比丘媒嫁夫婦私通者犯僧殘若成就二男行欲染事不終竟者似非媒嫁犯何篇事佛答犯決斷罪以與媒嫁其事同故盖比丘應以淨行成人而反以染事成彼者故犯罪也問二男欲口戲擬便止犯何事答犯墮成者犯決斷釋謂比丘成於二男欲染口中以為嬉戲彼二男擬欲為之便即止耳犯何篇事佛答犯墮者以是媒嫁之方便故成者犯決斷以同媒嫁故問牀席他人於上行欲其處可住否答見處淨洗可住釋謂比丘牀席臥具若見他人於上行欲即不清淨其行欲處可住止否答言若見其處淨洗可住以同界內行欲僧還住故問以唱僧䟦上座未食下座先食犯何事答唱便食不犯釋梵語三䟦羅伽多此云等供以眾僧食皆平等又云善至以供具善成食時復至因佛受外道毒食佛令眾唱三䟦羅伽多所有毒藥皆成美味然後方食此乃秘密言辭目其善至謂知食比丘以唱僧䟦僧中上座未用食時而下座先用食者犯何篇事答言若聞唱已便食不犯以如法事竟故意顯未唱食者犯惡作也問比丘不具六物犯何事答不乞作犯捨墮若乞不能得不犯釋六物者三衣鉢囊具也三衣乃賢聖沙門之幖幟具登聖地鉢斷邪妄利生之器囊表慈悲護生之具茲寔助道之要緣可得少乎謂比丘不具六物犯何事佛答謂道具乏者應乞若不乞求作為犯捨墮以慢佛教故若乞求而不能得者不犯問比丘大寒得通衣臥否答著衣得釋衣者臥具也謂比丘冬居大寒可得彼此通於衣被臥寢否答言著衣得者以開著衣不生異念故若非寒時同臥者越法咎也問比丘自𫁉貴姓及持戒強力乞得犯何事答犯捨墮釋貴姓者言剎利婆羅門持戒者修習梵行也強力者勇猛精進也若比丘自貴姓持戒強力乞求得財者犯何篇事答言犯捨墮者以自稱姓貴有德求財故問姉妹有腫病或有痛處比丘手按此處可治犯何事答若起心犯決斷不起犯捨墮釋腫脹也㿈也痛疼也按捺也治調也律云比丘與女人身相觸者犯僧殘若是姉妹有腫病或有痛處比丘手按此處可治犯何事答言雖是親族若起異心即同觸女之僧殘不起犯捨墮以慢佛語故故律云若檀越問大德我母病願大德為處方比丘不得處方作方便問傍人大德某甲病以何藥救若言長老用此藥瘥檀越聞二比丘語還為父母合湯藥若比丘作如是語無罪問姉妹無兒息語比丘教我方術比丘即教犯何事答犯決斷釋謂比丘姉妹無兒童子息語言比丘可教我生兒欲染方便術法比丘即教犯何事答言犯決斷者以不示正教令脩悲智男女法門而反誨世間法染故問寄比丘物與人竟不與犯何事答自取不過犯重著故壞還計直輕重釋謂人寄比丘物與他人比丘竟不與他比丘人犯何事答言若所受與者自取不過與之能與者犯重故律云若受人寄物物主來求口還而心決定不還物主作狐疑心比丘得重罪又受寄者若人寄物在比丘處物主來求比丘言我不受汝寄妄語應得波逸提為是偷方便故突吉羅若比丘念言此人寄我物無人知我今為還為不還得偷蘭遮若比丘決定心得物主作失心得波羅夷若比丘言我惱之彼若強諍者我還衣不諍者我當取物主以失心與比丘取此衣者犯重或著故壞還計直多少犯罪輕重問聚落中都不著衣犯何事答犯捨墮釋謂比丘入聚落中應著大衣或餘二衣不失威儀示福田相故都不著衣犯何事答言犯捨墮以慢佛語故問比丘啼犯何事答若聚落中一作犯捨墮三諫不休犯決斷釋啼者哭泣也謂律制比丘尼不得啼哭犯第三篇若比丘啼哭犯何事答言在聚落中一作啼時犯捨墮以違佛制故三諫不休者諫云大德稟持戒法當勿啼哭不宜違教若違教者即慢佛語慢佛語者不善大德當信佛語勿宜啼哭如是三諫不休止者犯惡性不受人語之決斷也問聚落中持弓刀看犯何事答先不知法無犯知突吉羅罪釋謂律制不得往觀軍陣若比丘於聚落中持弓刀看犯何篇事答言若先不知律法持看者無犯若知視看軍器有罪故看犯突吉羅罪問比丘騎乘犯何事答雄有一住犯捨墮過三諫不止犯決斷雌者一載犯決斷釋謂律聽老病騎乘以無異念故若比丘無緣騎乘馬騾驢犯何篇事答言若無緣騎雄者一住犯捨墮以故慢佛語故過三諫不止者諫云大德稟持戒法當勿騎乘不宜違教若違教者即慢佛語慢佛語者不善大德當信佛語勿宜騎乘若過三諫不止犯決斷雌者一載犯決斷以與畜生女身分相觸故問聚落中比丘看白衣鬪犯何事答犯捨墮釋鬪競也爭也謂律制比丘不往觀軍陣若比丘於聚落中看白衣鬪犯何篇事答言犯捨墮以慢佛語看生散亂心失正念故問比丘暫捉棊子五木而戲犯何事答犯墮釋棊子者言圍棋子也五木者梵語波羅塞戲此云象棋即隊伍之木也謂沙彌不聽執捉棊子若比丘暫時執捉棊子五木而戲犯何篇事答犯墮者以不信佛語而犯戒故問聚落中三歲小兒抱嗚口犯何事答犯墮釋抱持也嗚者聲出口也謂比丘之行遠離愛染若於聚落中以三歲小兒抱持嗚口犯何篇事答言犯墮以不信佛語作非威儀故問聚落中合白衣相撲犯何事答犯突吉羅釋謂律制不得親近相扠相撲以掉舉事故若比丘於聚落中合白衣相撲犯何篇事答言犯突吉羅以惡作事故問聚落中看白衣合畜生犯何事答知非法故看犯捨墮不知不犯內起婬心口有染污言犯決斷釋梵語底栗車此云畜生即六畜也言牛猪馬羊犬豕輔行云攝趣者以五道中皆徧有故又婆沙云畜養謂彼橫生稟性愚闇不能自立為他畜養故謂比丘於聚落中看白衣和合畜生犯何篇事答言若知看非法故意看時犯捨墮不知非法看時不犯若眼看時內起婬心有染污言同於麤惡之決斷也問比丘食不足得囑未具戒者否答得唯除婆羅門釋未具戒者言沙彌及五戒也婆羅門者言淨行也門者聞也聲徹於耳因他語而知法也謂比丘受食不飽足時得囑未具戒者否答言得者以食是助道緣故唯除婆羅門者以五戒人五常人得囑唯淨行不得恐生不善之語故問山中曠野中見一無主器物可取用否答得用要須語王若王家之人若語餘人得用不得持去犯捨墮釋謂律制比丘不與取犯戒若行於山中曠野中無人之處見一無主器用之物可得取用否答言得取用之但要須語王若王家之人或餘人得用明有證人取非不與取若用已不得持去須置本處不違前語白之言若持去者犯捨墮問道人作醫得取物否答若慈心持得作惡心不得無衣鉢前人與得取若有衣鉢前人強與為福事得取若人不與亦不得為福乞犯捨墮釋醫者療也言作醫療病疾之師也謂律制合和湯藥是邪命戒若比丘道人作醫病之師可得取財物否答言若自利已辦欲發濟人慈心而持守者作醫師或但有慈心亦得若希利邪命之惡心不得作也無衣鉢者言雖發慈心為無衣鉢前人與者得取若有衣鉢前人強與為修福事得取若人不與亦不得為福事乞若假福乞犯捨墮問食巾或少多醬菜飯羮墮上要須浣否答不污亦須日浣若有沙彌白衣付之日從受不犯若已付著室中無苦若不付有不浣犯捨墮釋謂律制受食威儀如法淨潔若比丘食巾或少多醬菜飯羮墮上要須浣否答言若食巾不污亦須日浣以表外則巾須日浣內則心垢時除也況有污而不浣也若巾污不污有沙彌白衣付之日從受持不犯若巾已付彼著彼沙彌白衣室中無苦若不付彼及有污不浣犯捨墮以慢佛語故問比丘私房小小出不閉戶有犯否答犯捨墮釋謂律制比丘應畜戶鑰不致失事若私己房室小小緣事出房不閉其戶有所犯否答犯捨墮以慢佛語故問比丘私房內拍手笑犯何事答犯捨墮釋謂比丘出處遵佛語離諸戲笑及癡眷屬而念所受法勿令忘失若於私房之內拍擊其手高聲而笑有違清訓犯何事答言犯捨墮以慢佛語故問比丘得躑過小水小坑否答不得犯墮昔有一優婆塞請一比丘欲與作一領好衣比丘即隨去中道有一小水比丘便躑度此優婆塞便嫌心念我謂是好比丘欲與一領好衣而更跳溝坑我歸當與半領衣此是無著知其人念前行見水復故躑過賢者復念我歸當與一張麤㲲前行見水復躑過賢者復念我歸當與一頓食無著復知其念前行見水便舉衣涉渡賢者問比丘何以不躑渡比丘言卿前與我一領衣己一躑過水正得半領復一躑正得一張麤㲲復一躑正得一頓食我今所不躑者恐復失食賢者乃知是得道人便向懺悔將歸大供養以此驗之知比丘不得躑過坑水釋躑者跳也謂比丘威儀行如象王牛王是名如法若行路值水坑時可得躑過小水小坑否答言不得犯墮以故犯非威儀也昔有一優婆塞下引請食行路躑水減䞋之緣自他少利由躑水道人說意二利方全況未得道人定不宜躑水併坑以此下結答行不得躑水坑也問比丘走犯何事答犯墮有急事不犯釋謂比丘行來須宜緩步學馬勝之威儀可謂善好矣若故疾速走路者犯何事答犯墮以故犯非威儀也除有兵賊虎狼火水急難事不犯問有人出家之後還來盜本家物犯何事答犯棄所以爾者初出家時一切盡捨非己物故釋謂有善信人捨物出家之後其所捨物盡屬本家還復盜取本始在家時物犯何篇事答言犯棄罪所以爾者以初出家時一切盡捨非己物故問比丘本在俗時共父母兄弟藏物出家後人盡死比丘還自來取物犯何事答若自取犯棄若有所親白衣可說便取作福應分半與官所以爾者此物無主應屬官不得全取取犯重釋謂比丘本始在俗中時共父母兄弟藏收財物及出家後俗人盡死比丘還復自己來取藏物犯何篇事答言若俗亡已自取藏物犯棄以始出家盡捨非己物故承上自取犯棄當如何爾若比丘有所親白衣可與說之便取作福應分半與官所以爾者此物無主應屬官不得全取若全取犯重問師更受戒小弟子弟子得下臘下戒及在下行否若不下得為作禮否答都無此理釋更者再也謂比丘敘臘以別尊卑若比丘師或犯戒緣作沙彌白衣更再受戒小於弟子之戒其弟子為當稱於上臘上戒上行為是還得下臘下戒及在下行否又問若僧必以臘別尊卑其弟子不得下臘等可得為師作禮否答言都無此理以師更受戒應稱下臘得為弟子作禮何以故以臘為尊故不存始時軌則故問比丘行他田地中或有苗或無苗有事否答有苗犯墮急事不犯無苗盡得釋謂比丘於岐路行不蹋生草是名持戒若行走他男女半擇迦之人田地中或耕懇種植有所生苗或無有所生苗有犯事否答言若有苗無緣而走犯墮除急事之緣不犯若無苗有緣無緣盡得問大悔人已發露或五三日或有難眾僧分散罪得決否答更求眾乃決釋大悔人者謂比丘犯僧殘於二十大眾中乞摩那埵行之人既已向僧中發露行行之時或經五三日而六日夜未終或有難緣眾僧分散雖六夜未滿二十僧中未作出罪羯磨其罪決了否答言更求眾乃決者若時未竟眾已散更再求眾及滿六夜時乃得決了豈唯令餘眾不舉其咎亦令犯者知慚不復更作也問王者問吉凶事比丘為說然後供養犯何事答若得食犯墮得衣犯捨墮若說征伐得供養犯重釋王者往也言四海之人皆歸往也吉凶事者言禍福消長也謂持淨戒者不得占相吉凶律已禁之若王位之者問比丘吉凶之事比丘為說然後供養比丘受之犯何事答言若說吉凶得食者犯墮以不信佛故得衣犯捨墮以貪慢心故若說征取戰伐得供養犯重以同為利教人殺故問比丘有緣事俗田行否答得釋謂比丘於路行時須視目前七尺之地不得左右顧視而行是正法威儀若有難事因緣正路不宜於俗人種植之田可得行走否答得者以遠難身安故問比丘未滿五臘不依止犯何事答不依止師若飲水食飯日日犯盜若先不知法猶得懺悔釋五臘者百一羯磨云如世尊說五法成就五夏已滿得離依止遊歷人間云何為五一識犯二識非犯三識輕四識重五於別解脫經善知通塞及能誦持大德若五法成就五夏已滿得離依止等大德有滿四夏善閑五法亦得離否佛言不得以五歲為定量故大德有滿五夏未閑五法此人得離依止否佛言不得以五法成就為定量故又若已證三明淨三垢纔三夏此人亦須依止師否佛言不由未得已得等已證已悟得離依止然由順所制事須滿五夏五法得離依止乃至近圓已生年八十滿六十夏亦須依止大德當依何人佛言依老者如無老者可依小者大德若欲師禮此欲如何佛言唯除禮拜餘悉應作此名老小苾蒭中出家者始受具戒沙門儀法未能周悉要須依止長宿有德行者謂律制滿五臘知五法得離依止若比丘未滿五臘不依止犯何篇事答言若不依止於師飲水食飯日日犯盜以無依止不知律法無德可消故若先不知依止之法猶得懺悔如法依止以顯知法不得懺也若尼不依承和尚犯墮問若比丘或十臘不誦戒答同上依止此重也問比丘市賣自譽己物過價前人信貴買犯何事答犯盜釋謂比丘持戒應不妄語若市易而賣自譽稱美己物過越其價前住信人信比丘不妄言之貴價而買此比丘犯何篇事答言犯盜者以盜取有二一身二口此屬口不與取故若五錢者犯重但四三二一者故云盜也問比丘行逈路有食無人受云何得食答正得舒一手下向一捉食便止過犯捨墮釋謂律制受食須有證人明非盜取故若比丘行於逈路有五嚼食無有證人授受云何得食耶答言若逈路有食正得舒一手下向一捉食便止得噉明不二捉也若過一捉至二捉者犯捨墮以慢佛語故問比丘舡行水奔不得下得水中便利否答得釋謂律制不得淨水中大小便應當學若比丘舡行水奔不得下得水中便利否答言得者以非故為是有緣故問比丘書經竹木上誦訖拭去犯事否答犯捨墮釋謂菩薩求聞半偈徧書市井康莊及諸木石俾見聞者皆獲義利若比丘書經竹木上誦訖拭去犯事否答犯捨墮者以誦訖拭去慢佛之語絕流通心故問未滿五臘得並入誦律否答不得為可麤教誡而已若誦犯捨墮大戒不滅沙彌戒故是沙彌非答非釋謂律制比丘滿五臘知五法得並滿五臘成就五法誦於廣律若未滿五臘未成就五法可得並入滿五臘知五法者誦廣律否答言不得為者以未滿五臘故但可麤教誡持犯重輕而已若故誦者犯捨墮雖云未滿之大戒不滅盡沙彌所學戒律故夫然者是沙彌戒非沙彌之大戒耶答言非是沙彌是大戒也問比丘晝眠犯何事答開戶不得犯墮釋晝者日中也眠者言仰臥睡熟也謂經云佛教比丘晝則勤心修習善法無令失時初中後夜亦勿有廢夜尚勿廢若比丘晝眠者犯何篇事答言開戶不得者以不信受佛語亦令見者不生信故所以犯墮故律制閉戶暫窹者得問比丘舍內都不著三衣犯何事答坐禪誦經不著犯墮釋謂律中著衣頌云世世常得披若比丘於舍宅內都不著三衣犯何篇事答言若坐禪誦經應著七衣若都不著犯墮以違佛制故顯餘時無犯問比丘行道著泥洹僧得繫脚否答大寒得釋謂律制齊整著內衣應當學以不得高下象鼻等若比丘行於道中所著泥洹僧得繫脚否答言大寒時得繫脚者以障嚴冷故顯餘時不得問比丘畜漆器犯何事答漆木器盡不得用犯墮釋漆器者言漆鉢器及隨鉢器也謂律制應器鐵瓦二種是如法器若比丘畜於漆器犯何篇事答言若漆應器木應器盡不得用以同外道故若用犯墮以不信佛語故問比丘己食手或搪飲食污手更得受食否答得釋搪者揬也衝揬也言或搪衝飲食污其手也比丘威儀須淨手受食若比丘己食手或搪衝飲食污手可更得受食否答得者以是皆食故問比丘至上房中不坐輙坐犯何事答墮釋上房者言樓上之房也不坐者言不應坐也輙者專也謂四分戒云不得安佛塔在下房己在上房住應當學若比丘至上房中知下房有佛不應坐而輙坐者犯何篇事答言犯墮者以不信敬佛語故問比丘旋塔或比丘尼優婆夷隨後從有犯否答若有優婆塞不犯釋旋繞也言旋繞瘞佛骨之所也若人香花供養祈福滅罪如生不異旋繞敬禮者近獲三乘遠至菩提矣謂戒本比丘不得與尼女共道行若比丘旋塔或比丘尼優婆夷隨後從之有犯事否答言若如是旋塔有優婆塞者不犯以無嫌疑事故意顯無者犯惡作也問比丘生菜已淨有根得食否答得釋生菜者言生氣之菜已火淨也謂律制菓菜勿啖生氣生命須淨之而食若比丘生菜已淨有根未除去者可得食否答得食者以淨成熟故問弟子遠行寄師物或師寄弟子過期不還或經年歲可取用否答若去時無言不得用若知在是有主物若死是四方僧物釋過者越也期者復時也言從旦至旦故謂律云凡僧寄物不得取用以活是有主物死是四方僧物故若弟子遠行他方寄附師物或師寄物與弟子皆過越所期之時或經歷幾年幾歲此物師資皆可取用否答若師資去時皆無有言我不還時汝可取用者皆不得用何以故夫師資雖親若知在是有主物若知死是僧物故此影師資有言者皆得取物也問比丘教白衣不祭一切亡人為是理否答非假使父母不食敬心供養亦得其福釋祭者祀也儒云祭則致其嚴經云孝順父母師僧三寶若比丘教化白衣不祭一切亡人為是理否答非者以祭雖是權有報本生孝之義不絕人倫之情若云不祭非出世之正理也恐彼意云我云不祭者以亡人不食故即縱云假使父母不食者奪云若敬心供養亦得其福故問眾中得共師並坐否答不接得共盤食釋比丘威儀不得與大己五夏者共房住以是闍黎位故若比丘在眾僧中可得共師並坐受食否答若比丘在眾僧中共師之坐不相接者得並坐共盤食明並接者不得問比丘不褰三衣禮佛犯何事答眾多釋褰扱也說文云收也引也威儀云比丘不得足蹈袈裟敬如塔想若比丘不褰三衣禮佛像者犯何篇事答眾多者此少犯字約義應云犯眾多以不褰而禮乖於聖制犯眾多學法之惡作也問比丘得手自合藥否答被淨草得釋經云持淨戒者不得合和湯藥以犯邪命故若比丘可得手自合藥用否答言被淨草得以不傷物命故問比丘休道意已著俗服經時向其尊禮拜然後來投眾求復常位為應聽否答若不捨戒者應聽釋休息也言休息學道之意也謂比丘休道意捨法服已著俗服經於多時亦向其俗中之尊親禮拜即名俗人然後來投眾僧求復為比丘常久之時戒臘之位為應聽否答言謂雖休道著俗服向禮者若不捨戒者應聽本臘常位可作戒羸懺悔明已捨者不應聽也問比丘知其父母兄弟破落屬人而不購贖有罪否答若為行道不贖無罪釋破落者言破壞零落也購者以財相賕也贖者以財贖罪也菩薩戒經云若見劫賊賣佛菩薩父母形相不贖犯輕垢若比丘知其父母兄弟破落屬人而不購贖有犯罪否答言若為修行大道期出輪迴以拔親等生死之苦緩於世間少時苦緣而不贖者無罪以顯不行道者有罪即墮也問若人白僧稱言聖眾得然可否答不得然可釋聖眾者言四果之人也謂四分戒云自稱言得上人法者犯棄若人白於僧伽稱言聖眾得然可為聖眾否答言不得然可者以眾有凡僧故問若人持物施僧言施聖眾應受否答若不言得分得取以眾通有俗故釋謂律明施僧物不應與尼錯因果故若人持物施僧伽時言說施於聖眾可應受否答言若不言聖眾者得分得取以眾通有俗僧故顯有言者不得取也問行道過水使人負渡犯何事答若不老病犯墮釋負者荷也渡者濟也謂四分戒比丘不得與女人身相觸犯僧殘若比丘行走道路過越於水使人負渡彼此身分相觸犯何篇事答言若不老病使人負渡犯墮以犯男身相觸故若有老病緣者不犯問眾僧家奴比丘得小小倩使否答小小取與得大事不得釋倩者假借便人曰倩謂律明僧物體重如山不宜私用若眾僧家奴比丘得小小倩假便人使用否答言若小小取與得使大事不得者即是僧物故問比丘養爪甲長犯何事答犯墮釋涅槃經云髮長及爪甲長是破戒之相若比丘畜養爪甲長者犯何篇事答犯墮者以律云半月一剃此是恒式又經云惡比丘相頭髮鬚爪悉皆長利是以犯過問上座比丘未浴下座於前浴有犯否答犯墮釋謂四分戒云半月洗浴以除風濕垢穢無病比丘應受須敘臘之尊卑不違佛制若上座比丘未浴洗而下座不敬上座即前浴者有犯事否答犯墮者以不敬人如婆羅眾會故問比丘器中忽有異物或復弊故不知誰許可取用否復可棄否答與僧不得私用釋異物者言奇異之物也弊故者言弊壞故舊也謂四分戒云不與取者犯棄若比丘應器中或餘器中忽有異物或復弊故不知誰許可得取用否若用是不與取復可棄否答言若器中有物應與眾僧不得私用者以無主認者應屬僧故若取用犯棄問有一住處多來去僧所有遺亡或是神或是弊衣永無取用者可取否答與眾僧眾僧停一月一歲後得用若後主來僧物償若是貴珍寶眾後不能償者勿用釋一者同也言有招提是僧伽一同之住處也神者重也言神重之珍寶也謂有一住處多有來去之僧所有遺下忘收之物或是神重之寶或是弊故之衣永遠無人來取用者其遺忘主已作失想應不以活死同例比丘可得取用否答言凡招提所有遺忘盡與眾僧不宜自取雖與眾僧僧應停止一月一歲之後可得用耳以待彼索故若用已後主來索者將僧物償之若遺物是貴珍寶眾後不能償者勿得用之問比丘有知舊白衣來造已得語上座維那持僧食與否答僧先令得不令不得釋若比丘有知舊白衣來於界內造為其事已畢可得語上座維那持僧食與否答言若僧先有制令開與俗人得持僧食與之不令不得者言僧先不有開俗人制令者不得持食與也故日藏經云時知事人得利養已或自私食或復盜與親舊俗人以是等緣久處惡道出已還入如是愚痴不見當來果報輕重我今誡勑沙門弟子念法住持不得自稱我是沙門真法行人倚眾僧故他信施物或餅或菓菜但是眾僧所食之物不得輙與一切俗人亦不得云此是我物別而食也問比丘捨道還俗後更出家前師故是師非答非是釋捨道者文云大德僧聽我從今日不復能持大比丘戒三說謂佛制受法者為師不受法者非師若比丘捨修道之戒還歸俗家後更出家受戒前師故舊是師非也答言非是者已捨戒法故問臨壇諸師僧可呼言師否答無此理不從受法者盡不得為師釋諸師僧者言諸人受戒之三師七僧也謂律明壇上作法皆名為師若沙彌登壇受具其臨近壇所諸人受學之師僧可得俱呼言師否答無此理者以臨壇師僧無此稱呼師之理也何者不從彼受教授三羯磨三證戒四隨相四依之法故是以臨壇者盡不得為師也問一切師得呼為和尚否稱為弟子否答不得正可敬重如俗中之尊釋一切師者言一切諸人受戒之師也謂佛云授戒法稱為和尚若一切人受戒之師皆得呼為和尚否皆得稱為弟子否答言不得者以未受法皆不得稱故然雖不得豈可慢之正可敬重如俗中之尊也報恩經云問得稱佛作和尚阿耆梨否答於弟子有和尚等義佛不為人作和尚是故不得稱也從諸比丘三語三歸受戒得稱和尚等否答不稱和尚得稱阿耆梨大愛道八法受戒亦得稱阿耆梨不得作和尚也問佛云何為人不作和尚等答為平等故佛等心故令盡事無偏不與彼作和尚不與此作和尚又止鬪諍故若作和尚等則有親踈既有親踈即有鬪諍又為止誹謗故若作和尚外道當言沙門瞿曇自言慈等一切與一作和尚不與一作和尚與俗人無異又為成三歸故若佛作和尚則墮僧數如受具三師七僧十眾受戒若作和尚則入十眾若入十眾即墮僧數無有佛寶若無佛寶不成三歸也十四三自歸事三自歸事品第十四釋三者言佛法僧也自者言對他住相三寶也歸者投也依也言歸投依彼能息無邊生死苦輪大怖畏故如是三寶皆自歸乎一體非他住相也薩婆多毗婆沙問曰三歸以何為性有論者言三歸是教無教性受三歸時胡跪合掌口說三歸是名身口教若淳重心有身口無教是謂教無教也有云三歸是三業性身口意業有云三歸是善五陰以眾生善五陰為三歸以三寶為所歸所歸以救護為義如人有罪投王求救護等歸依佛者何所歸依名歸依佛答歸依語迴轉一切智無學功德問為歸依色身歸依法身耶答歸依法身不歸依色身不以色身為佛故問若色身非佛者何以出佛身血而得逆罪答以色身是法身器故法身所依故若害色身則得逆罪不以色身是佛故得逆罪歸依法者何所歸依名歸依法答歸依語迴轉斷欲無欲盡諦涅槃問為歸依自身盡處他身盡處答歸依自身盡處他身盡處是歸依法歸依僧者何所歸依名歸依僧答歸依語迴轉良祐福田聲聞學無學功德是名歸依僧問為歸依俗諦僧為歸依第一義僧若歸依第一義諦僧者佛與提謂波利授三自歸不應言未來有僧汝應歸依第一義諦僧常在世間故答以俗諦僧是第一義諦僧所依故言未來有僧汝應歸依欲尊重俗諦僧故如是說問三自歸趣得人受復有不應受者答除五逆罪得釋謂律明受戒以三歸為戒體若住信人受於三寶皆自歸乎一體有所趣向是得與一切人受復有不應受者耶答言唯除五逆之罪此不應受餘一切人盡得受也問三自歸斯行何事答身口意不行邪事及不隨邪見師釋謂律明受三歸者是為修明心跡之師範也若受三歸之後斯行何事不乖所受耶答言謂身口意之用不見有所行二邊邪事及外不隨謬執己見乖於諦理邪見之師者如是即契三歸之正道故問云何犯自歸答好邪見隨外道師釋若住信之人云何所為即犯所受三自歸邪答此三歸者由迴彼有無之邪心轉從一心之正道故若好分別之邪見隨外道師者即犯三自歸也問若犯三自歸云何悔答向本師悔若無本師向餘比丘亦得釋謂三歸是入道之正緣心師之妙迹若人好邪見隨邪師犯自歸云何懺悔答若犯之後但向本受三歸之師懺悔即得清淨若無本師向餘比丘亦得文云大德一心念我某甲好邪見等犯三歸今向大德發露懺悔三說彼云慎莫更作答云頂戴奉持問若不能持得還否答得釋謂三歸既修道之正務當永奉持若人邪見之習厚者而不能受持可得還於師否答得者以不使邪見雜於正道故不令淨信生不善心故雖云得還已植當來道種故問若還還云何答向本師若一比丘言我從今日已後不復能歸佛歸去歸比丘僧如是三說若不滿三故成就三歸釋謂律明比丘捨道還俗須還戒法不令在家犯於過故若三歸難持亦得還者其還之法為云何也答言但向本受三歸之師前若餘一比丘言我某從今日已後不復能歸三寶如是三說若不滿三故成就三歸以受時三說還時亦滿於三方不成就三歸問受善難持當宜獎勸云何佛許還也答以初受時植其善因況後還語豈不熏心至于多生必蒙利益例不輕緣等一理爾問或人受三自歸乃悔宿命惡逆為是理非答無此理釋律明受戒須露罪緣三業無尤方納戒法若或有人受三自歸時乃悔宿命中十惡五逆為是其理非耶答言無此理者以現生罪相輕重不差宿命惡逆有無難定心境乖違故無此理問三歸正得從一人受復得從三人各得受一歸否答不得釋謂三自歸者是一體三寶名雖有差其體元同以心體本無分別約智而言名為佛寶本自清淨絕欲而言名為法寶本來圓融稱理而言名為僧寶是名一體三寶若三自歸正得從一人受復得從三人前各得受一歸否答言不得者以受一歸時二義具足由體同故問受三歸法要終身復可得一年半年十日五日否答隨意多少釋經言受八戒法隨意不定若人受三歸之法要當終盡身形復可得一年半年十日五日否答言隨其受法人意多則終盡身形少則年月日皆可問若從師受一年半年自歸日滿後故是師非答一從受法終身是師釋若人從師受三自歸一年半年自歸日滿為如菩薩永劫之師為是歸日滿後故是其師非耶答言以受法後無論滿與不滿但一從受法終身是師問三自歸得但受一二歸否答不得釋若受三歸時既云隨意多少亦得但受一二歸否答不得者以體雖同德用差別故非法非律非佛所教故是以不得受一二歸問受三自歸現前無師得逢從文受否答不得釋謂佛以法為師得成大果若人受三自歸或現前無師亦得逢於經文即從文中受否答不得以無所授之師故不類法先佛後而相例故問先受三歸犯不悔得更受否答不得要當悔若欲當受捨先所受若不捨更受者不得釋謂律制更受須如法悔已得受若人先受三歸犯於邪見隨外道師不懺悔者可得更受三歸否答言不得者以未悔邪見及師有覆藏心未得清淨故要當悔已得受若欲當更受者捨先所受歸法可爾更受若不捨者更受不得也十五五戒事問五戒事品第十五釋五戒者一不殺謂常念有情皆惜身命恕己愍彼以慎傷暴二不盜謂不與而取即名為盜義既非宜故止攘竊三不婬若在家即不邪婬謂女有三護法亦禁約守禮自防故止羅欲四不妄語謂覆實言虗誑他欺自端心質直所說誠實五不飲酒謂昏性亂神酒毒頗甚增長愚痴故今絕飲原佛五戒本化人倫若不受持人間路絕若持無犯承此戒善越於三塗得生人中名人乘法故經云佛弟子有二種一在家者初受五戒為本遮三惡趣求人天福以未能永捨家眷緣累故更加三戒助前五戒一日一夜種未來世永出因緣也問不受三歸得受五戒否答不得釋謂律制受戒先受三歸戒體次授戒相使識相護持令戒體圓滿若人不受三歸得受五戒否答言不得者薩婆多云問若人不受三歸得五戒否若不白四羯磨得具戒否答曰一切不得若受五戒先受三歸受三歸竟爾時已得五戒所以說五戒名者欲使前人識五戒名字故若受八戒十戒如五戒說五八十戒功德力少是故若受三歸即便得戒不須多緣多力若具足戒須多緣多力也問若受三歸犯而不悔者得受五戒否答不得釋謂受戒之制先審其妨懺滅愆尤堪稟戒法若人先受三歸犯於邪見及師而不懺悔者得受五戒否答不得者以未懺邪見有覆藏心未獲清淨故問受五戒法可得但受五日十日一年二年否答隨意多少釋謂住信人欲受五戒為當要至終身可得如三歸但受五日十日一年二年否答隨意多少者言隨住信人意多則終身少則年月日皆可也然此隨意之制是開權時事若至方等時優波離問五戒可得十日五日否佛答不得以如來制戒各有限齋五戒者必盡形壽八戒齋法一日一夜問受五戒不悔得更受否答不捨不得更受不悔亦不得捨釋謂若人已受五戒或犯殺業及於盜等欲如法者應悔已更受而不悔者可得更受否答若不捨戒不得更受以有所受戒在故縱然捨戒須當懺悔若不悔者亦不得捨而更受也問五戒盡得悔否答若殺人婬其所尊及比丘尼盜三尊財者不得悔餘得悔釋謂律明有所犯戒作法懺悔若人受五戒有所違犯盡得悔否答若住信人殺斷人命婬其所尊及比丘尼盜三尊財者皆不得悔以殺即重婬即逆重及尼者如蓮華色女在俗與母共夫與女共婿遂驚生死迷亂乃至於此若非出家顛倒何息即詣佛所聞法求度佛命愛道度之證果後乞食時有婆羅門見生染心伺彼乞食伏于床下是日諸尼竟夜說法疲極還房仰臥睡熟婆羅門即作不淨行彼覺已昇空婆羅門床上生入地獄盜三尊財者如經云若居士以盜心取像利養犯不可悔計直輕重以盜心偷舍利犯中悔以恭敬心而作是念佛亦我師清淨心取無犯若盜佛像為供養故無犯罪也若為得錢轉賣得偷蘭遮盜經不問供養不供養計錢得罪若盜舍利偷蘭遮罪也僧物可知餘者謂除上三戒餘盡悔也問五戒若不能持得中還否答得還若欲都還五戒合三自歸還言從今日佛非我尊我非佛弟子如是至三法亦爾若還一二三四者但言我從今日不復能持某戒如是至三若不滿三戒猶成就釋謂受戒既隨意多少若五戒不能持可得中還否答得還者以遠近皆得故若欲都還五戒者同前三自歸還如文云云問五戒可從五師各一戒否答得釋謂三歸受正得一人以同體故五戒名體皆差若遇緣發心可從五師各受一戒否答得者以機緣應時故問既受五戒偏所重可但分還一二否答得釋謂住信人既受五戒偏其所重難持可但分還一二戒否答得者以例受時隨意故問五戒可但受一二三否答得隨意多少釋謂住信人於其五戒不能全持可得但受一二三戒否答得者以隨機之意得也若據薩婆多部毗婆沙問凡受五戒不能具受五戒若受一戒乃至四戒受得戒否答曰不得若不得者有經說有少分優婆塞多分滿分等此義云何答曰所以作是說者欲明持戒功德多少不言有如是受戒也問比丘犯重戒或犯酒戒得否答不得釋謂比丘見住信人犯五戒中若重若輕應教懺悔受持而故令人犯重或犯酒戒得否答不得以無教人犯戒理故問頗有八戒白衣否答無惟有八關齋釋頗者可也八戒者始於不殺終至不坐高廣大床關者閉也言持此戒能閉三惡開昇天路齋者齊也言齊身口業也又齊者秖是中道後不得食者表中道法界外更無別法故此戒以齋為體八事助成合而稱之名八關齋謂律制在家不能終身守戒開其方便一二日等若在家不能齋者頗有八戒白衣否答無者以無八支戒之白衣教中唯有具體之八關齋時有以剃髮者搭衣授八戒按經律中非法非律非佛所教盖為在家不能終身持戒之方便也故報恩經云此八戒於七眾中何眾所攝以無終身戒故不名優婆塞以有一日一夜戒不名五常人當名中間人是知與出家授八戒者安忍以沙門相不置七眾內而置七眾外豈唯壞於軌則亦同無解作師矣十六十戒事問十戒事第十六釋十戒者一不殺生二不偷盜三不婬欲四不妄語五不飲酒六不著香華鬘香油塗身七不自歌舞作倡及故往觀聽八不坐高廣大床九不非時食十不捉生像金銀錢寶若按律文名下出家者先以十戒為本盡形受持雖捨家眷因緣執作於俗人等是出家於具戒者故是在家是名下出家其中出家者次應捨執作緣務具受八萬四千向道因緣雖捨作業緣務身口行業未能具足清淨心結猶存未得出要上及不足下及有餘是名中出家上出家者根心猛利次應捨結使纏縛捨結使纏縛者要得禪定慧力得禪定慧力心得解脫心得解脫者名淨身口意出於緣務煩惱之家永處閑靜清凉之室是名上出家也問不受五戒得受十戒否答若先三自歸得以十戒中即有五戒亦不復受釋謂善戒經云層樓四級次第而登不至初級至二級者無有是處乃至不至三級至第四級無有是處若人不受五戒得受十戒否答若先受三歸不受五戒者得受十戒何者以十戒中即有五戒故問犯五戒不悔得受十戒否答不得若先不知悔已受而不悔不得釋若人已受五戒後犯不悔得受十戒否答不得者以未如法故已受下應有得字若沙彌先不知犯戒懺悔已受十戒者得雖受得戒亦要懺悔而不悔犯不得如法故問若師犯重戒從受十戒得否答不得釋謂律制和尚德臘具足方堪為師若師犯重戒從受十戒得否答不得者以師不清淨所受戒者不成就故問若犯重戒從受十戒得否答不得釋若犯重戒一句約義脫於闍黎二字以前問中是和尚故銷文釋義如上問沙彌犯十戒盡得悔否答同上五戒釋此中悔不悔同上五戒之意十七沙彌事問沙彌品第十七釋此品標沙彌悔懺說戒等事又間於比丘歲坐等事疑是累朝奉重藏必重刊謄寫失其次序也問悔須眾否答不須眾但向本師得了若現在無師向餘一比丘亦得釋謂比丘犯事輕重之殊對首懺悔多少不一若沙彌悔過時須假眾否答不須眾者以沙彌受戒不以多緣多力而成就故是以悔過但向本師得了若現在無有本師向餘一比丘亦得問沙彌半月一說戒否答無此理所以爾者以沙彌戒不成俗人然終已可說釋謂佛制比丘半月說戒令長養善法淨除破戒之過若沙彌亦得半月一說戒否答無此理者以沙彌律無此半月之理也所以爾者以沙彌戒不成俗人然終盡沙彌受比丘戒方可半月一說問沙彌犯戒得還向沙彌悔否答不得釋謂沙彌犯戒悔向本師及餘比丘此若無時可得還向沙彌悔過否答不得者良由比丘境勝了知持犯重輕亦可勉勗呵責令其如法以沙彌智淺不解開遮持犯故問沙彌得著俗服否答不得釋律制沙彌剃髮即著縵衣及裙是如法之服可得著於世俗人衣服否答不得者以剃髮披緇形服相稱故問師有種種違法事沙彌得捨更求師否答得釋違法事者言犯戒邪見威儀淨命等皆違背教法之事也若沙彌之師是模範之義而有種種違背法律之事沙彌可得捨離更求師否答得者以師有非法別求良導故問沙彌叛師以白衣師綜習俗竟不捨或經年月還來投師故是沙彌非但悔過而已不須更捨戒耶答故是沙彌但向師懺本不捨戒不得更受受亦不得戒釋叛者返也綜者綺縷也律制離俗沙彌不得親習浮遊俗子及破戒沙彌恐妨正念若沙彌叛返於師以白衣為師綜習俗事竟不捨之或經年月還來投其所叛之師故舊是其沙彌非耶為是但悔過咎而已不須更捨戒耶答雖叛習俗故是沙彌但向師懺綜習之過不須捨戒以本不捨戒法故不更受也縱受亦不得戒問沙彌為賊所抄經歷年月或轉經主得迯否答轉經主不得釋賊者害也抄者擄掠也若沙彌為賊所抄經歷幾年若干月或轉經主可得迯走否答若賊轉賣經於買主不得迯走以顯未經主得也問沙彌犯禁師僧已擯謝否更出家否答若不捨戒故是沙彌可懺而已釋禁者制也戒也止也大經云如佛禁無常汝猶說者即破佛禁舌則墮落今云佛禁重戒及邪見等律明沙彌犯根本者是突吉羅滅擯及邪見等皆不共住若人已受沙彌之戒干犯佛所禁止之戒師僧俱已擯棄謝退比得更出家否答謂雖擯謝若不捨戒故是沙彌祇可懺悔而已問白衣時從沙彌受五戒然後出家受大戒本師故是沙彌得呼為師否答得呼為師但不得為禮白衣時從尼受五戒然後出家亦爾釋謂若人在俗白衣時從沙彌受五戒然後出家受大戒本師故是沙彌可得呼為師否答得呼為師以受法故終身是師但不得為禮乖尊卑戒臘故又白衣時或從尼受五戒等如上問比丘貪資之物犯何事答其罪甚重昔有一比丘貪著一銅鐃死後作餓鬼眾分物竟便來現其身絕大黤黮如純黑雲諸比丘驚怪此是何物眾中有得道者言是死比丘貪著銅鐃故墮餓鬼中今故貪惜來欲索之諸比丘即以鐃還既得便捉舌䑛放地而去諸比丘還取之而絕臭不可近復使人更鑄作器猶臭不可用以此驗之知貪為大患比丘貪著衣服乃有自焚之酷昔有一比丘喜作衣服晝夜染著得病困篤自知當死便舉頭視衣內起毒想言我死後誰敢著我此服不久命終作化生蛇還來纏衣眾與死比丘出燒葬訖遣人往取衣物見蛇纏衣近咽吐毒不敢近即還白眾具說所見諸比丘便共往看之都無敢近者有一比丘得道入四等觀四等觀毒不中便往近之語言此本是汝衣今非汝有何以護之便即捨去不遠入一草毒火出然草還自燒身命終即入地獄地獄一日之中三過被燒皆由貪害釋謂比丘之行息滅三毒若貪愛資生之物犯何篇事答謂餘長財等獲咎猶輕其貪愛資生及衣服者罪甚重也昔有下引二事證成貪罪於中各三初明貪事之因次明死後之報後明結證罪重也歲坐竟懺悔文釋此文分三初標歲坐發露三初僧聽學佛歲坐若僧聽多薩阿竭所受歲坐比丘應爾釋多薩阿竭此云如來若僧聽者言若僧時到僧忍聽多薩阿竭所行受歲結坐我等比丘應爾受歲結坐竟懺悔也問佛從他安居自安居答有言從他安居有言自安居何以故佛自得一切十力四無所畏故不從他又云佛自結此法自制此法是故自安居問佛三語安居一語安居答佛一念安居不以口言以不忘故二明前後開遮我從歲始至今歲竟六月中多所違失違失者戒事除二鼻二事餘不除是世尊集和僧所教勑釋我比丘某從受歲結坐之始至今一歲之竟前餘安居六月中多所違犯過失違失者戒事若眼耳舌身意所犯如法懺悔唯開除左右二鼻所聞香臭二事也且如五篇中欲染之法始由意中貪習次發身行口言然意雖為欲染之主若無眼見耳聞身行口言之助緣欲染違失戒事無由而犯矣是知鼻聞男女身香亦為助緣比於四根茲為其次故可除也餘之四根違失先助故不除之然五根所犯是大覺世尊集於和合僧伽所教勑命之懺悔也三發露請忍今我是思念共諸君發露陳說所違失事君各忍受釋君者群也言請群下各各忍受發露也謂今我比丘是六月中思念五根所犯共諸君發露陳白而說所違失事請君各各皆忍可受我所犯令獲清淨也二別釋二初明時中全缺我若九十日無世尊定無世尊智無世尊戒故多犯無世尊智無世尊戒故犯無世尊戒故犯無世尊智故多失教事無世尊定故多犯亂意釋文標世尊定智戒者言如來所演三藏之教詮顯戒定智之三學故非言果位有三學也謂我比丘若於前後九十日時無有世尊所說戒定智故所以多犯過也此含有三學而證道果或於此時但有世尊定故缺於智戒二學故有犯過也此含有戒智二學缺於定之一學也無世尊下別明三學犯事謂因不學世尊戒故遂干犯別解脫過又不學世尊智故多有失學佛所教誡之事又不學世尊定故多有違犯乱想邪思之意也二明念所犯事或念欲法不行欲事或念盜法不行盜事或念殺法不行殺事或念欺法不行欺事或念僧伽婆尸沙法不行僧伽婆尸沙事釋或者不定之辭也承上時中全缺主助皆具故多違犯過失也此但舉意所念戒學初篇二篇之事未具四根之助雖然過輕亦須懺也戒念既爾餘之二學皆念違失可知矣謂比丘或於此時念思欲染之法不行欲事或念思盜取三寶之物及官民物之法不行盜事或念思殺害於人及故殺眾生之法不行殺事或念思欺人而言證得智果之法不行欺事或念思僧伽婆尸沙身相觸至於污他家之法不行僧伽婆尸沙事三結犯事通輕此九十日中所犯事通威儀釋謂比丘於此九十日中五根所犯之事不但初二篇已犯之事及念思未犯乃至通於威儀之事亦須作法懺悔也良由佛制受歲比丘自恣舉過發露懺悔內心無隱覆外律獲清淨禪定解脫皆有之矣縱未證得豈不罪滅福生乎此後三問白衣欲出家及多人受戒沙彌受戒重前故略書之授五戒比丘唯得授婆羅門於餘者尼授不得問中間事問者犯僧殘釋此文少問否答三字謂律制受戒預審其妨遮難清淨方堪如法問若比丘授人五戒唯得授婆羅門戒問之及於餘者皆可問否答謂婆羅門及餘者皆須問之但與尼授比丘不得問中間事以女身中間隱屑之事令彼羞慚故若違而問者犯僧殘以同婬欲語故問一切所有王者不全施得取否答王者不嫌便得釋謂律制惡求多求犯罪施而取之生人福故若比丘於四事等一切所有是助道之緣而王者但供一二不全施與比丘得取未施物否答若王者不嫌難滿難養者便得取之影嫌者不得取也問見人行欲不呵犯事否答前人可諫不諫犯捨墮若不可諫向一比丘好發露釋謂戒明菩薩入僧中見非法笑者不呵止之犯罪若比丘見人行欲不呵止之犯事否答若前行欲之人不覺而犯可諫令悔捨不諫者犯捨墮以慢佛語故若或兇惡及豪強之力而不可諫者即向一比丘好發露亦得不乖戒和同修之德也問比丘先犯事更受戒得共住否答犯重不得更受戒決斷講過得更作不悔亦不得況得共住釋律制波羅夷不共住若比丘先犯事不捨戒作白衣沙彌更受戒可得共住否答言犯重者不得更受戒豈得共住若犯決斷不須捨戒但講說悔過一種羯磨得更受戒若決斷二種羯磨中更作決斷不悔亦不得更受戒況得共住問有急事比丘持弓箭上舡可隨去否答主犯重寄載犯捨墮釋律禁不得觀象馬勢力併弓刀等若有賊難兵難等比丘持弓箭上舡寄載比丘可隨去否答主載比丘犯重以比丘出俗當秉般若弓堅固箭殺煩惱賊期出生死而持刀兵器正與賊叛同事故若寄載者犯捨墮以慢佛語故問比丘官逼作非法犯何事答不得作釋謂律明僧之綱要有三如法如律如佛所教若比丘被官法所逼作非教法之事者犯何事答不得作者以官法雖逼決不可為故經云寧可失身命甚勿有所犯是也問二男共戲便止犯何事答成犯決斷釋此問同前解意問比丘盜聽二男行欲犯何事答無欲心聽犯捨墮有欲心聽身不失犯突吉羅釋承上成二男者犯過若比丘知彼二男覆障處行欲而盜聽者犯何篇事答若無欲心聽犯捨墮以知而不呵即慢佛語故若有欲心聽而身不失犯突吉羅若失犯僧殘問比丘病不能行得乘車馬否答雄者盡得雌者無想犯捨墮有想犯決斷不知是雌無罪釋律禁騎乘有罪若比丘病難以行走得乘車馬否答若雄者盡得以制比丘不與女身相觸故今非畜生女兼有病緣異念不生故雌者無想犯捨墮以慢佛語故若有想犯決斷以與畜生女身觸故不知是雌無罪以無想心故問比丘嫌經不好賣去更作好者犯何事答賣經如賣父母罪同釋謂經詮妙義乃法身父母應尊重供養豈在莊飾精奇故不宜嫌若比丘嫌經不好賣去更作好者犯何篇事答若比丘賣經其罪甚重如人賣父母即逆罪同也問二男角力犯何事答犯墮釋角者競也觸也謂比丘應以忍辱之力示人是大人覺者若成於二男角競血氣之力是小人掉舉犯何篇事答犯墮者以與相扠相撲同故問畜生行欲比丘驗令全別離犯何事答犯捨墮釋經云比丘守護根門如龜藏六不得縱心而視邪境若畜生行欲比丘驗其令全方別離之犯何篇事答犯捨墮以慢佛語故問著小衣行留大衣得受人施否答言得釋謂入聚落應著大衣受施若比丘著小衣行入聚落中施主家留大衣於界內得受他施否答言得者以三法衣皆名福田衣故問比丘夏中得受僧物否答若施僧物即應分不得停釋謂比丘夏滿方受衣財有急施衣止開十日若於夏坐中不受施物有人施僧物可得受僧物否答若檀越施現前僧物即應分不得停止若停止夏滿有去來之僧故以顯非僧不得受問比丘有好知家結事委任之更異比丘從乞得物犯何事答觀主人意不得犯捨墮知主意好得取釋律明比丘乞食振錫三下三若不來至於五下五若不來至於七下以不令施者生譏嫌故若比丘有好知家而結屬家事委任之更有異比丘從其委託乞求得物而任之有犯何篇事答委託比丘觀主人意惡不得與若與犯捨墮以取有主之物故若知主人意好者得取與也問鳩於人舍內作窠比丘破或塞鼠孔犯何事答鳩未有子得去有子不得鼠穴唯有一孔不得塞若有內外孔得塞內者釋比丘不得壞鬼神村種子村犯墮若鳩於人舍內作窠巢比丘破之或塞鼠孔犯何篇事答若鳩窠中未有雛子得去有子不得以損眾生命故若鼠唯有一孔者不得塞以絕彼命故若有內外孔者得塞內者留於外孔令出入故問比丘得與師友同學得作書否答在他方情通異國不得釋律明弟子於師當三時敬禮晨昏問訊於友應迎來送去以酧拔濟輔助之功若比丘或遊行於它方得與師友同學修作書信問候表其誠否答若在它方得作情通異國不得作書以犯王禁故問人出家王法父母不聽為得戒否答不得釋律制犯輕遮者不得受戒若人出家王法父母俱不聽度之受戒此人為得戒否答不得戒以故違佛禁也又非法非律非佛所教故三流通分三初讚請二許說三奉行初讚請爾時目連從座而起白佛言世尊快說毗尼於如來滅後誰能受持如是毗尼釋快說毗尼者言快然暢佛所懷答說目連啟問五百輕重之事因果罪福之緣令無慚僧咸生善信離苦得樂故但未知滅後誰能受持如是毗尼之法也二許說二初思者能持二謗者輪迴初思者能持佛言目連思學毗尼者當知是人能修行如是毗尼釋謂佛言目連若人於如來滅後末法聞是毗尼能思而修之學而習之當知是人決能修行如是毗尼也二謗者輪迴佛告目連吾滅度後若有比丘比丘尼誹謗如是毗尼者是魔朋侶非吾弟子如是人輩世世學道不成不出三界吾今憐愍諸眾生輩釋謂佛告目連若吾滅度之後有比丘比丘尼聞是戒已即誹謗言此乃為小乘鈍根令循方便之事非我大乘利智之行不信入大之本者當知是人是魔朋侶以不樂慕戒法故非吾弟子者以不依佛教故如此人輩豈但不思習佛道縱然世世思學佛道徒用其功不成無學以不信戒為道本故是以永處輪迴不能超出三界故是故吾今憐愍諸眾生輩故說斯戒脫凡入聖之要輔也三奉行是時目連聞佛所說歡喜奉行釋聞說喜者謂目連聖者聞佛所說輕重之事罪福之緣又說受持者速出輪迴疾成佛道言誹謗者永處生死佛道無成由是能令無慚比丘仰學珍重於戒緩者欣慕修學共出輪迴期登極果是佛慈悲善護流通所以尊者聞是說已歡喜奉行偈曰超凡入聖戒為先珍重修持志特堅極位護斯成最勝初心於是學猶偏目連五百慈悲問愚輩三思採律箋仰願法門崇信者脩因當列佛三千
