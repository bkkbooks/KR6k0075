body:
  text: 失譯人名今附東晉録明愍忠寺傳講毗尼比丘永海述將釋問戒大分為三初標題目二明譯人三釋本文初標題目釋題十四字通別合稱上十三為別下一為通就別題中統括其義謂佛說目連五百問是七衆戒律中輕重事之經也若別釋之有五重義名體宗用教相名者人法為名人者佛與目連法者五百問等梵語佛陀華言覺者謂覺了諸法性相之者又覺具三義一者自覺悟性真常了惑虗妄二者覺他運無緣慈度有情界三者覺滿窮源極底行滿果圓說者悅也謂佛由此戒證於菩提欲以妙行益物今得機而說暢悅所懷故名佛說梵語目連此云採菽氏以上古仙人好食於菽仍以為姓其名尼俱律陀此云無節樹以父母禱樹神而生故以為名問者評也言戒有持犯輕重之疑數有五百一一問而決也戒者梵語尸羅秦言性善言性本自善無所染污戒體然也亦云波羅提木叉此云保解脫謂保持三業離諸縛也律者法也從教為名斷割重輕開遮持犯非法不定故中者內也輕重者輕是第三篇至第五篇重是初篇二篇事者由也緒也言輕重事是篇聚之因由亦是泥犁之頭緒也謂目連所問非定慧中事乃戒律中隱攝未制輕重之事佛說開遮之緣輕重之事故曰人法為名體者無作為體謂衆生靈明妙心本來無作由隨於根境之緣作諸惡業致使無作真心染於妄想而不證得若欲返妄歸真須受尸羅妙行故於情非情境上發心斷一切惡之殊勝思受所引誓不淫等即名為色此心所及所引色於境量上不起一念有作心之勝用是發無作心體由是勝用了證靈明無作妙心之體故名無作為體宗者信心慚愧為宗宗者主也趣也慚者不自作惡愧者發露向人若人雖信戒心苟無慚愧或故作或覆藏尚不滅業與果況證無作之體故信心之後以慚愧為主能證無作戒心為趣故名為宗用者離苦得樂為用用者力用也苦者三界生死之苦樂者三乘出世之樂謂既稟戒獲體具慚愧者當有何益故明持戒有慚當離世間輪回之苦必獲出世涅槃之樂故名為用教相者三乘酪味為教相教者乃聖人被下之言相者分別同異謂戒是如來初說華嚴乳味時不動寂場而遊鹿苑分別說三酪味之教而為相故名為教相通題經者梵語素怛囉此云契經謂契理合機之教又貫攝為義謂貫穿所應說義攝持所化之機通別合稱故名佛說目連五百問戒律中輕重事經二明譯人失譯人名今附東晉録釋附東晉録者言唐宣師述內典録始於漢明帝終至大唐列陳各朝釋經沙門善士人名併三學法名今問無譯人之名不知何朝而譯良由此經於東晉時國內盛行既失譯之名今附彼録三釋本文三初序分二正宗分三流通分初序分二初品題二序文初品題五篇事品第一釋五者謂波羅夷等篇者偏也謂此五中偏說重輕之事事者揀理而言即動作營為之事品者梵語渠波此云品集義類以彰品名第者居也一者數之始也以文分一十七品此居其一釋文為三分者自如是我聞起至當墮何處是為序分自爾時佛告起至於問終是正宗分自爾時目連至於文終是流通分首言時方聞衆證信序也當機咨問發起序也初述經之來源故有序分既許咨問是以目連一一而問如來應機隨義而答令人起慚愧心永斷諸惡獲大利益故有正宗分此問非但當時得益後五百歲遠霑其利故有流通分二序文二初證信二發起初證信二初聞持之所二聞持之伴初聞持之所如是我聞一時佛住王舍城迦蘭陀竹園釋如是者舉所聞之法體我聞者能持之人一時者聞持和合非異時故佛者時從佛聞王舍下聞持之所梵語羅閲祇伽羅此云王舍城謂劫初慢他多王瞿貪陀王如是等聖王於此建舍宅故梵語迦蘭陀此云好聲鳥謂聲好而形醜以群棲竹林故名迦蘭陀竹園此下無聞持之伴者影攝聞持之所文中以下文云從座而起必有同聞之衆又流通云吾今憐愍諸衆生故二發起三初啓白二讚許三正問初啓白是時目連從座而起白佛言世尊我今欲有所問唯願世尊為我演說釋是時下謂目連既同住園中心懷所疑之事故從座起白佛下謂佛乃世出世尊能知因果纖毫不差方答我問故白之也我今下謂我今欲有所問諸事惟願大悲世尊為我演說將欲正問而先啓者蓋佛是無上大聖須先請知不卒問故二讚許佛言善哉汝所問者能大利益無量衆生恣汝所問釋佛言下謂佛稱讚汝所問者是利益有情問也既有是益故讚善而許之三正問時目連白佛言世尊末世比丘輕慢佛語犯衆學戒雜用三寶物當墮何處釋目連下遠敘末法信寡犯戒致報而問也末世者揀非正像故乃世道交喪之時輕慢佛語者敘罪過緣起有四一無知二放逸二煩惱熾盛四不尊重由是於佛語之法輕忽侮慢意含正法時反此犯衆下正問所犯諸惡當墮何處犯者干也謂干犯所受之戒衆學戒者謂廣釋毗奈耶及十七事中所有衆多惡作惡說咸悉攝在突學法中是故總云衆多學法今舉輕而問其餘輕重皆攝之也此是所作之業雜者參錯也雜用三寶物者言佛物有四種之殊法物不同僧物各別於三寶諸物之中參錯而用也按寶積經營事品云佛言有檀信施屬佛法僧三寶之物營事比丘應善分別不應共雜而用三寶之物如現前常住僧物不應與招提僧招提僧物不應與現前常住僧此二僧物亦不共雜亦不與佛物共雜佛物不與二僧物共雜若常住僧物多而招提僧有所須應集僧行籌索欲若僧和合分與迦葉若如來塔或有所須若敗壞者若二僧物多營事比丘應集僧行籌索欲作如是言是佛塔壞今有所須此二物多大德僧聽若僧時到僧忍聽若僧不惜所得施物若常住若招提我今持用修佛塔若僧和合營事比丘應以僧物修治佛塔若不和合應餘勸化求財修也若佛物多者營事比丘不得以佛物分與二種僧何以故於此物中應生世尊想佛所有物乃至一線皆是施主信心施佛是故諸天世人於此物中生佛塔想而況寶物若有施衣於佛塔中寧令風吹雨爛不應貿易寶物何者如來塔物無人能與作價者又佛無所須故佛僧如是法物宜然以事體同故此三寶物該一十七品若道若俗是所作業之事也若業與事總名為因當來下謂若有所作惡因當來墮落何處惡果地獄之所也如是因果餘人不決唯佛究竟明了故咨請問二正宗分文分一十七品初五篇事二三寶事乃至十七沙彌事初五篇二初誡許二正說初誡許爾時佛告目連諦聽諦聽當為汝說釋諦聽者誡之辭也言誡而說者以所問事是生慚之要門滅業之正路故誡諦實而聽當汝說也二正說六初衆學戒二波羅提提舍尼三波逸提四偷蘭遮五僧迦婆尸沙六波羅夷初衆學戒若比丘無慚愧輕慢佛語犯衆學戒如四天王壽五百歲墮泥犁中於人間數九百千歲釋此答末世犯戒之由及受罪之處時也慚者內生羞耻為慚愧者外生羞耻為愧梵語突吉羅此云惡作約身言惡作如不齊整著衣等約口言惡說如含食語等若比下明無慚信寡之人犯衆學戒者標所犯事也如四下喻明犯事墮獄之時言四天王者提頭賴吒秦言持國主乾闥婆及毗舍闍居須彌東黃金埵毗琉璃秦言增長主鳩槃茶及薜荔多居須彌南琉璃埵毗流波叉秦言廣目主諸龍及富樓多那居須彌西白銀埵沙門秦言多聞主夜叉及羅剎居須彌北水晶埵索隱云福德之名聞四方故壽五百者按俱舍論云人間五十年下天一晝夜計五百歲墮泥犁中者此云無有謂無有喜樂無歡無利此即等活地獄謂彼罪人手生鐵爪相摑肉墮或獄卒唱或冷風吹活兩緣雖異等一活故於人間下按論該九百萬歲以頌云五十年為一晝夜三十晝夜該一千五百年十二月該一萬八千年十年該十八萬年一百年該一百八十萬年若五百歲總該九百萬年又優婆塞戒經云四天王壽人間數九百萬年故知千字傳寫之訛下諸數例此二波羅提提舍尼犯波羅提提舍尼如三十三天壽千歲墮泥犁中於人間數三億六十千歲釋此四篇所犯事也梵語波羅等此云向彼悔如比丘於村中從非親尼自手受食食是比丘應向餘比丘悔過等如三下喻明犯罪墮獄之時梵語多羅夜登陵舍此云三十三壽千歲者按論云人間一百年為天一晝夜計一千歲墮泥犁中者此即黑繩地獄以熱鐵繩絣量肢體後方斬鋸故於人間數該三億六千萬歲三波逸提犯波逸提如夜摩天壽二千歲墮泥犁中於人間數二十億千歲釋此第三篇所犯之事也梵語波逸提此云墮謂墮在燒煮覆障地獄八熱八寒是也如夜下喻明犯事墮獄之時梵語須夜摩此云善時分時時唱快樂故壽二千歲者按論云人間二百年為天一晝夜計二千歲墮泥犁中者此即衆合地獄以衆多苦具熾然猛熱合來逼惱故於人間數該一萬四千四百萬年四偷蘭遮犯偷蘭遮如兜率天壽四千歲墮泥犁中於人間數五十億六十千歲釋此初二篇之方便也梵語偷蘭遮此云大遮謂大惡遮善道後墮惡道體是鄙穢從不善體以立名者由能成於初二篇罪如故瀉精而未瀉等故如兜下喻明犯罪墮獄之時梵語兜率陀此云知足於五欲境知止足故壽四千者按論云人間四百年為天一晝夜計四千歲墮泥犁中者此即嘷呌地獄謂獄卒捉人擲鐵鑊中嘷咷大呌故於人間數該五萬七千六百萬年五僧殘犯僧伽婆尸沙如不憍樂天壽八千歲墮泥犁中於人間數一百三十億四十千歲釋此二篇所犯事也僧伽者善見律云為僧婆者為初謂僧前與覆藏羯磨尸沙者云殘謂末後與出罪羯磨此覆藏即波利婆沙行二種行若犯此罪僧作法除故從境為名如不下喻明犯罪墮獄之時梵語涅摩地此云自在亦名不憍樂若依秦言化自樂謂自化五塵而娛樂故今云不憍樂者憍逸也以自化樂故不憍也壽八千歲按論云人間八百年為天一晝夜計八千歲墮泥犁中者此即大呌喚地獄謂獄卒置罪人鐵鑊中號咷大呌故於人間數該二億三萬零四百萬年六波羅夷犯波羅夷如他化自在天壽十六千歲墮泥犁中於人間數五百二十一億六十千歲釋此第一篇所犯之事也梵語波羅夷義翻名棄四分云譬如斷人頭不可復起若犯此法不復成比丘故偈云諸作惡行者猶如彼死尸衆所不容受以此當持戒自古皆從衆法絶分名棄如淫殺等也如他下喻明犯罪墮獄之時梵語婆舍跋提秦言他化自在此天奪他所化而自娛樂故是欲界頂假他所化成自樂故即魔王也壽十六千歲者按論云人間一千六百年為天一晝夜計十六千歲墮泥犁中者此即焰熱地獄謂獄卒置罪人鐵城中火然燋爛由燒炙衆生墮此獄中故此上名有間若謗毀三寶五逆等罪壽命一大劫墮第八無間也於人間數該九億二萬一千六百萬年二佛事品問佛事品第二釋佛物有四種一佛受用物殿堂衣服床帳等既曾受用只安佛塔中不得移易互用二施屬佛物不得移至他寺三供養佛物花香幡蓋等如花多聽賣買香油猶多更賣著無盡財中若幡多施主不許不得餘用四獻佛物供養塔食治塔人得食佛前飯侍佛比丘得食問佛物先在一處有比丘賫至餘處作佛事犯何事答犯棄一切佛物不得移動若有事難衆僧盡去當白衆若衆聽得賫至餘處無罪釋此問佛物前在處後人賫他處作佛事犯過也佛物下言第二及三之物先在此一住處有人賫至餘一住處作殿等佛事也犯何事者言此既移彼知其有過擬是佛事不決重輕故問犯何事也答犯棄言若移佛物犯棄罪故一切下蓋由移動是不與取及用佛物故若有下明移之開緣也難者憂也患也事難有八病王賊水火衣鉢梵行命意謂若有事難衆僧盡去當作單白羯磨衆皆默然聽許得賫無罪良以此開恐失佛物併施福非同竊取及用故又含不聽移之有罪如上問佛物得買供養具否答得釋此問第二得買第三佛物也得買下謂有人施屬佛物比丘得買花香幡蓋供養具不答得前所問事是移今既不動是正因故亦布施時未定何事故三種佛物皆得用故是正果故又令施主時增福田故問佛物造堂與真可賃否答一切佛物得買不得賃釋此問第二作第一受用物也直價直也賃者以物取利曰賃謂比丘以佛物造堂有人與直既不移而有利可得賃否答一切下言四種物中所攝一切佛物得買若買須五倍價以佛物無人能與作價故不得賃者以佛無須故又同世間法故若故賃者越法咎也或云佛因尚以頭買施人況果物云買者何也答良以佛物事重法僧不宜況其俗乎如天子宮室非臣下所居若故居者得重咎故若謂佛乃出世非同世間者豈惟無益於世使人咸發闡提之心可不慎哉問比丘作佛事得佛奴牛驢馬得借使否答若知本是佛物不得不知得以非法得故釋此問作第一佛事以第二施物得借使也佛奴者以佛物買之侍佛故或身充所缺故牛驢馬者或佛物而貿併所施也得借使者謂比丘作佛事用佛物非己用取利可得借使否答佛言若比丘知牛馬本是佛物不得使也以比丘自作佛事求福而借用佛物有損故若故用之重罪咎也不知得者言不知奴牛是佛物得使以非法得故蓋如法比丘不用佛物故問僧地起塔用佛物作籬籬裏可住否答若知故入犯墮不知不犯若知故住過三諫犯決斷過四諫轉犯重釋此問僧地起塔用佛物作籬可住也僧地下言比丘於僧地起塔用佛物作籬而圍之雖僧地僧居既用佛物作籬此籬裏僧可住否答佛言若比丘知佛物為籬即僧地已是佛物不宜入住而故入者犯墮以不信佛語故若不知是佛物而入者不犯墮也若知下明增重意若知故住有如法僧諫遮其故住所以詰其用佛物之非理諫云大德此地佛物作籬不可住之若故住者即用佛物故用佛物者不善大德當信佛語勿住此也如是一諫二諫過三諫不捨者犯決斷罪以惡性不受人語若犯而覆者隨覆日多少僧前與波利婆沙覆藏羯磨行覆日別住已末行六夜摩那埵如不覆者僧直與行六夜摩那埵行已次二十僧中作出罪羯磨決斷其罪故過四諫轉犯重者以善者受諫如海納流今既不受非復比丘所以犯重如俗人不共住也問先佛堂壞主人更出私財作堂用故財施比丘比丘可取否答言不得釋此問主人以己財作堂用故財施比丘可取也先者前也壞者毀也更者再也私財者言私己之財非公化十方之物也故財者言佛堂故壞之財也謂主人先修佛堂已壞而施主更出私財作修佛堂用更易故壞之財施與比丘而比丘可取也佛答不得取也言物雖屬主已施如來既屬世尊豈再為主故云不得施也若比丘明知佛物不宜受之故云不得取而故取者計錢多少犯重輕故問僧地佛物用作都籬籬裏先有井果菜可食否答不得若是檀越物作佛事先要以果併菜施得食不要不得食若買五倍價若知不買而食計錢多少犯罪釋此問第二佛物作僧地籬先有井果可食也都總也籬障也言僧地以佛物作籬而護之此內先有井果菜可食也佛答有四義不得食也一者言籬裏先有井果菜既佛物作籬不得食者由籬護無損即是佛物故二者若井果是檀越物欲作佛事除先要以果菜施僧後作佛事可得食之若不要施僧許作佛事即是佛物尚不得食況佛物作籬可取食也三者言若比丘欲買而食者須五倍價以價重即止買念取食心也四者若比丘知佛物不買而食者計錢多少犯罪多則棄少則偷蘭突吉也問缺負佛物物云何償答直償本物以佛不出入故不加償雖爾故入地獄昔佛泥洹後一比丘精進聰明有一婆羅門見比丘精進聰明持女施比丘作比丘尼比丘即受其女姝好比丘後生染意作不淨行共生活用佛法僧物各一千萬錢用衣食而此比丘極聰明能說法使人得四道果自惟罪深重便欲償之即詣沙佉國乞大得錢物還欲酬之道路山中為七步蛇所螫比丘知七步當死六步裏便向弟子言何處償物遣還本國言汝償物已還我住此待汝弟子償物訖還報之即起七步便死墮阿鼻地獄中初入溫暖未至大熱謂是溫室便舉大聲經唄呪願獄中諸罪人鬼聞經唄者數千人得度獄卒大嗔便舉鐵扠打之即命終生三十三天以此驗之佛法僧物不可不償雖復受罪故得時出矣釋此問比丘缺負佛物云何酬也缺少也負者受貸不償也言人借用佛物或償之缺少及受貸不償佛物也云何者猶言如何也為是直償本物或加倍而償佛答有三意初正答言比丘欲償時但償還本所負缺不增減故良以佛是出世大聖不同世間出少入多故不加利償之雖爾不加由故借用當入地獄地底也下也獄扄也言地下之獄拘扄不得自在故此在南洲下五百踰膳那三引證昔佛明用物由言昔迦葉佛滅後有一行解之僧時有婆羅門覩比丘之德施女作尼求解脫故而比丘受之因其女姝好後生染污淨行之心即作不淨之行遂男女共同資生活命用三寶物各有千萬用為衣食而此比丘有行解說法之益能使人得四道果亦自惟忖用物罪重便欲償之即詣他國乞化大得錢物以用償也道路下明用物之報言比丘欲回因道路山中為七步蛇所螫以人四大力故行至七步蛇毒力故不至八步比丘既知七步當死於六步內便向弟子說何處償議云本國即遣還本國言汝償物已還來我住此待汝也弟子償訖還報之起七步便死入獄以初入溫暖未至大熱而謂是溫室者以獄之相罪人見為別境及至境時即為惡報順其熟習故為溫室梵語匿唄此云止由是外緣已止已斷爾時寂靜住為法事也故法苑云西方之唄猶東土之讚也由謂溫室便舉聲經唄呪願施主福田因經唄聲令罪人發心得度也獄卒下言彼意恨罪人不改過遷善數煩勞苦故大瞋以鐵杈打之即死生天也三結勸言往世因果昭然以斯驗之凡係佛法僧物不可不償雖復受罪故得即時出不可不償由償物故雖復受苦故得即時出矣問佛塔上掃得土棄之有罪否答得棄不得餘用釋此問佛塔掃土棄有罪也言佛塔之土即是佛物為得用之若棄即失佛物可有罪否佛答得棄者言土雖塔掃而是飛集之塵不是塔質故棄無罪不得者言但霑塔之氣分不得餘用凝土尚然況於佛物豈宜可用問佛物出與人取子息用犯罪否答與佛物同體俱犯重出入合子與佛由故無福以壞法身而為形故釋此問佛物與人取息用犯罪也子嗣也息利息也言前用佛物犯重若比丘以第二佛物出放與人取物子息而用不知犯罪也佛答子息既因佛物而有即與佛物同體故俱犯重下明僻解之非若謂用息有罪以出入佛物合其子息與佛物增長亦是福也蓋由增佛物故所以無福何以故以壞戒等之法身而為形故問佛圖主遣佛奴小兒給比丘可使否答不得使以是佛物故釋此問主遣佛奴給比丘可使也佛圖主者張騫使大夏還云天竺國有浮圖之教或言佛陀聲相轉也譯云淨覺言滅穢明道為聖悟也由主佛陀之事故云佛圖主遣差也言比丘自用佛物有罪若圖主遣給可得使也佛答不得使者因名佛奴所以即是佛物故問比丘要與佛作得食佛食否答不得比丘無客作之理何況取佛物衣食用耶釋此問比丘與佛作得食佛食也食啖也佛食者佛物為食故言比丘要與佛作為殿堂得食佛食也此用有緣非同前之無緣故佛言比丘雖有作緣亦不得食以比丘入三寶數為法王子極為所尊豈有至尊之僧反為至劣之客作故云無客作之理此事尚不宜為何況取佛物為衣食之用也問白衣與佛作得佛物用此物作食請僧僧得食否答不得食釋此問白衣與佛作得物作食僧得食也言前問比丘作不得食若白衣與佛作得物用此作食請僧僧得食也佛答不得食以食雖屬於白衣終因佛物而有故是知食受白衣之名即不得食況無名者豈可食也問佛事法事得捉金銀錢否答不得捉犯捨墮釋此問佛事等得捉金銀也此金銀乃不淨之財故律制不捉而遠過若比丘為修佛殿堂等事教法等事得捉金銀錢否佛答不得捉也言金銀名不淨財者以五欲之首雖為佛事不得自捉附執事人如是上不違佛之制次不令俗議謗是名權宜若故捉之即有貪慢之心故犯捨墮問人施牛驢馬奴造佛事法事可受否答得受使用但不得賣弓刀軍器一不得受釋此問人施牛等造佛法事可受也言持淨戒者不畜牛等皆有過故若人施比丘牛驢等作佛法事可得受也佛答得受者蓋佛法慈悲為本若見機得受使用以有生福滅業之緣故但不得賣者防殺過故弓刀軍仗乃損害衆生之器亦犯國禁故一不得受問人施佛屋宅未用可寄住否答不得便是佛物釋此問人施佛屋宅未用可寄住也言前問賃住佛堂地皆云不得若人以己宅施屬於佛像未受用可得暫時寄之住也佛云不得者以屋雖未用由施後便是佛物故問續佛光明晝可滅否答不得若滅犯墮雖云佛無明暗施者得福故滅有罪釋此問續佛明晝可滅也續連也晝者日之中也言人施油續佛前之光明不令有暗比丘節減己用以晝日之明代光可得滅也佛云不得者違施主意故雖云下遮謬解也或曰佛乃大覺常光一尋智光無量豈有明暗之殊故可滅也佛言雖云佛無明暗為施者得福若故滅有罪也問非佛屋佛像在中可在前食臥否答得若佛在世猶於前食臥況像不得但臥須障若有燈光明不得足光中過住若自有燈得釋此問俗屋非佛屋像在中可食臥也食者受食也臥者𥨊息也言施佛屋即不得住若俗人屋非佛受用有佛像在中比丘可在前食臥否佛云得於食臥若佛下釋意蓋得者若佛在於世時比丘猶前食臥況滅後之像豈不得也但臥須障者言立佛不坐坐佛不臥故顯行住坐無障也若屋內像前有供佛燈光之明不得足止光中過住即用佛物故若自有燈得過住焉問上佛圖佛塔佛墻遠望犯何等事答不知不犯若必急難事上亦不犯知而上犯捨墮過三諫犯決斷過四諫故上犯棄釋此問上佛圖等犯事也上登也佛塔者言瘞佛骨之方墳也佛墻者言大殿之墻圖寫佛像也律制師影不得蹈之若比丘上佛圖等遠望犯何等事佛云不知者不犯以無慢心故若必有急緊難事恐傷命緣上亦不犯若知佛在下房己上房住犯惡作罪況上佛圖又無難緣故為慢意犯捨墮諫云大德此佛圖等比丘當尊重不可上望若故上望即慢佛語慢佛語不善大德當信佛語勿更上之如是過三諫不捨者犯決斷罪若過四諫故為而上者犯棄問指物造佛經更得他物不用前物得爾否答不得以許便是釋此問指物造佛經更得他物不用前物得也指物者已許之物他物者未許之物若比丘於施主人指示所得之物以造佛經又得他施之物即造佛經不用前所指可得爾否佛云不得者謂非但自有妄言又失信人福故何者以許物造經便是佛物故問得買佛上繒作衣否答不得釋此問得買佛繒作衣也買市也繒帛也言供養佛上之繒也衣者三法衣也若比丘造作袈袈得買佛上繒帛作法衣否佛答不得者以損施主功德福田故問形相佛像犯何事答一切佛像不問好惡不得形相其罪甚重必不可為也釋此問形相佛像犯事也形比也相視也像似也佛像者佛之相好相似也言比丘於金銀等像應至心讚禮念報佛恩不生是念而反形相佛之相好像似斯於五篇中犯何事也佛云凡一切佛像不問是好與惡不得形相以其罪甚重義當逆罪必不可為形比之大惡也問佛墻得持物倚否答不得犯捨墮昔有一比丘入寺禮佛有婆羅門知相相比丘有天子相便語比丘我有一女嫁與比丘比丘言須我禮佛還比丘便持錫杖倚佛圖墻入寺禮佛已還出婆羅門便不復與語比丘問故與我女否婆羅門言不與婆羅門言向見比丘有貴相故與今無復此相是故不與所以爾者消其功德故以是佛墻及塔壁不可持物倚既犯戒又消其無量功德釋此問佛墻得持物倚也物者道具等也倚依也若比丘上佛墻有過可得持物倚也佛云不得者輕慢尊儀故若故倚者犯捨墮罪昔有下引證三意一倚佛墻緣昔有一比丘至我禮佛還二獲罪之相比丘便持錫杖至於消其功德三結證犯事以是佛墻至消其功德也問人作佛像鼻不作孔後人得作否答不得釋此問人作像鼻不作孔後得作也若緇素人作佛像成已惟鼻不作其孔後隨喜之人可得作否佛云不得者有犯形容故問佛物得作天人世人畜生像否答佛邊得作釋此問佛物得作天人等像也天人者帝釋等世人者給孤等畜生者獅象等若比丘知第二佛物不得餘用若造佛殿中之諸天外護之給孤坐上之禽獸得作如是像否佛答得作者以有表義非餘處故蓋天表至極之尊人表悲濟之勝畜生表無畏說之極故問比丘度人不知本末後度知是佛奴而不發遣犯何事答若知而度犯重若先不知知便發遣若不發遣犯重釋此問度人不知本末後知佛奴不遣犯事也度濟也遣驅也比丘度人先不知彼本用佛物末以身屬佛是佛奴後時度已聞知是佛奴存之而不發遣犯何事也佛答言若比丘知是佛奴而度是用佛物則犯重罪若先不知本末後時度已方知便即發遣若不發遣犯重罪也問其人是大道否答非釋此問其佛奴人已度是大道也其者指物之辭若其所度之人先未受戒是名佛奴既受戒度已是稱大道比丘否佛答非者言其度人縱受比丘戒已佛奴名不可移以未償於佛物故云非大道之比丘也問自有私財顧比丘作佛像作者得取物否答不得釋此問自財顧比丘作像作者得取物也顧賃也私財者言己之財也若人自有私己之財顧比丘作為佛像作者可得取物否答云不得以有客作之名故問先上佛幡得取用作佛事否答佛事得用檀越不聽不得釋幡者轉義言轉惡成善也謂施主先上供佛之幡比丘得取用作菩提會等之佛事否佛言若是佛事得用以皆是供佛故揀餘事不得若檀越不聽取用者不得若聽者得也問得通禮過去七佛否答得以法身同故釋通徹也禮履也進退有度尊卑有分謂之禮故大論云人之一身頭最為上足最為下以頭禮足恭敬之至過去者揀非未來七佛者毗婆尸此云勝觀尸棄此云寶髻毗舍浮此云遍一切自在拘留孫此云所應斷拘那含牟尼此云金寂迦葉此云飲光釋迦此云能仁言比丘禮釋迦佛時可得通禮過去七佛否也佛云得禮以諸佛應身雖殊而所證法身皆同故問若人先許佛三會然後作一會或三行香三布施得了否答言不得自違言有罪釋此問許三作一或三行香施得了也佛三會者菩提涅槃生時等會言人有集福等緣許佛三會然後慮事煩財乏作一會或三行香布施得了前願否佛言不得以許三作一自違言有妄語罪故問比丘犯決斷得佛地中懺悔否答不得釋佛地中者言佛殿地中非僧作法戒場之地也懺悔者華梵相兼梵語懺摩此云請忍言請現前僧忍受發露其罪悔於後時不敢更作故謂比丘犯決斷罪應於僧中羯磨行行二十衆中出罪若僧數不足又無託處或故違教得於佛地中懺悔否佛云不得以僧作法用於佛地而壞如來軌則故問久遠故寺都無垣障不知佛地遠近若欲作者云何得知齊畔答不知當以意作齊畔以不知故增損無罪釋寺嗣也言治事比丘於中相嗣而住垣墻也障隔也謂年月久遠故寺四圍都無垣墻障隔比丘不知佛地遠近大小若欲作者云何得知齊限邊畔也佛云若不知者當以自意酌量而作齊畔以不知故設或增損所以無罪問佛物作鬼子母屋及作像有罪否答同以佛物施人釋梵語訶利帝母梁言鬼子母故律云時王舍城人皆稱訶利帝母又寄歸傳云西方施僧齊日初置聖僧供次行衆僧食後於行末安一盤以供訶利帝母屋者舍也止也言人於舍止住也謂比丘以佛物作像及屋為有罪否佛言若比丘用物作像同前施主以佛物施人計錢多少犯罪問佛塔前得禮比丘否答不得犯捨墮釋律制師僧上座應行禮敬若不敬禮婆羅門聚會法也言比丘於佛塔像前得禮比丘足否佛云不得禮以比丘見師等當行禮敬若互相值於佛塔前當敬於佛故不得禮若故禮者犯捨墮或云法身非相無處不周豈有前與不前故皆得禮今云不得者是應身有相即有能禮所禮前與不前故云不得比丘若在塔像前佛不尊而禮比丘者喻如朝中主不尊而禮臣下者慢君之咎也若按此制尚不禮人若轉身背佛向外禮神者亦非禮之極也亦捨墮也蓋古之梵剎皆無護法面立於前俱在左右以表慈威之意今時不存古制增設護法殿宇欲美觀瞻反違佛教幸以理推上遵佛制不宜面設護法神也問比丘賣佛像有何罪答同賣父母釋佛像者言人之慧命父母也若比丘賣出佛像有何等罪佛云同賣父母以比丘用佛物犯棄此賣比於用者更重一等故云同人賣父母是逆罪也或云佛行菩薩道時尚捨身而救苦豈得成佛兼是像似賣資而獲其罪豈不違於因耶答佛因捨身乃利人之實事今證大果生人福田若於佛像而不生善反賣出之是惡業緣故云同世之逆若云佛慈可賣如是必發闡提之心善無惡有自他無益故云三世諸如來不出如斯假也問比丘自手斷樹掘地作佛塔寺及造形像有福否答尚不免地獄受大罪苦有何福耶以故犯戒故釋此問自手斷樹掘地作佛塔寺像有福也掘穿也斷決也別解脫中斷樹掘地有損害他安之義佛已制之今造為佛塔寺像可有福否佛言若比丘故違聖制而作善尚不能免於地獄受大罪苦有何等福耶以故意犯如來之戒故三法事問法事品第三釋法者玄理幽微正教精誠故此理教實苦海之舟航涅槃之徑路也說法者自遵佛制觀機演教聽法者欽仰規模躬聞聖化如是堪為傳法可稱如渴思漿設非法而諫過三四弗如教而咎更彌增沙門稱謂焉可名哉況復貪心受施身佛物而不分代佛之儀座迷先而於後及至機塵俗帽應知所宜祕律焚燒須明得否若或故乖慈訓隨事無可逃焉如其慚愧心生因戒禪智得矣問高座說法前人著俗服可與說法否答聽法說者二俱犯衆多過三諫不改犯突吉羅復過三諫犯決斷復過三諫至棄若使不諫經三說戒轉增釋此問人著俗服可與說也俗服者言世俗人之服明非如法解脫服也若比丘於高顯之座說法前聽法之人著其俗服是不恭敬者可與說法否佛答法乃佛師聽人須著法服師是模範觀機如孝二親若故乖違聽法說者二俱犯於衆多應當學也有如法者諫云大德欲聽說法當著法服不宜俗服若俗服者即違佛語慢佛語者不善大德當信佛語勿著俗服如是過三諫不改犯突吉羅說者諫詞大同此答文前後影於復過三諫犯墮也復過三諫犯決斷以惡性不受人語故復過三諫至棄者以其非復沙門故若使諸比丘見其非法俱不諫者經三說戒其罪轉增約義而言當逆罪也問為說法者如法餘聽者不如法得說否答同上釋說如法者言比丘宣揚妙法無所希求觀時鑒機翹勤欽仰如經三軌名說如法聽如法者好樂多聞修如實慧尊重梵行體具威儀如婆羅門名聽如法言說法聽者既皆如法有餘聽者不如法時可得說否佛言同上例我如來於布薩堂有取金花不如法者佛則不說是也問請人說法先高座上有帳蓋是供養佛物得於下坐否答都不知不犯知不得釋此問座上有帳是佛物得於坐也帳幔也蓋傘也言比丘請人說法未設座前有帳蓋是供佛物說法比丘得於下坐否佛言請者說者都不知佛物下坐者不犯以不故令人有過及用佛物故若二人明知有佛物即不得坐若坐者二俱犯墮以不信佛語故問僧坐先寄佛在上後可於上座說法否答佛坐得先是僧坐不得釋先寄者言律制法座須像在先表代佛揚化故謂僧說法座先寄佛在上疑有佛座比丘後可於上說法否答佛座得者言佛先在座後可得說法也若先是僧在座後寄佛者不得以無代佛揚化故問若人請比丘讀經及說法施物得受否答若有希望心受犯捨墮若無貪心受不犯若無衣鉢受不犯釋言若人請比丘讀經說法為祈禳集福等而施物者可得受否佛言若有希望心非益人想同世噟之事故犯捨墮此貪心之物須僧法捨財罪心則名為善不捨者當墮地獄若無貪心為彼福田受之不犯或無衣鉢受不犯問僧中說法高座上得備機捉塵毛尾否答病得備機捉麈毛尾者犯墮非毛得釋機案屬言機案承足故塵者言鹿王之毛尾若比丘於僧中說法座上得備機捉麈毛尾耶佛答言比丘足有病緣得備機案承之若捉麈毛尾者犯墮以損彼身分而得故若線布等拂皆非獸毛故得捉用故薩婆多云苾芻有時為講誦踞師子座機案承足故有塗香應將物替躡之又為遮蚊蟲故聽作拂扇或用麻紵白㲲破衣諸葉也問祕經及戒律有事否答犯捨墮釋祕者言隱藏也謂比丘之體應弘法以報佛恩若祕隱經文及於戒律有犯事否佛言犯捨墮以佛說經戒皆囑流通由慢意隱藏故犯罪也問師具著俗服向說法得禮否答得不病不得為說法釋師者言和尚等謂比丘之師著於俗服向其說法得禮足否佛言得者若有病緣二俱得也故律云病比丘應為說法䇿其正念也師不病但可禮足不得為說法以違毗尼故問白衣頭上有帽得為說法否答除有病必須覆頭餘悉不得釋白衣者即彼師之俗服也帽者謂拘修羅衣言比丘之師著於俗服頭上有帽得為說法否佛言除有病緣必須覆頭得說餘息不得者言自病之餘悉不得也問經上有塵土草穢得吹去否答不得釋經者梵語修多羅此云契經所謂契理契機托華云契理則合於二諦契機則符於三根功超世教敢不敬乎若經卷之上有落塵土草穢可得吹去否佛言不得以口穢氣故若故吹之惡作罪也問比丘得書經取物否答不得取犯捨墮釋書寫也言尊重聖經書寫流通也若比丘得為人書經取物也佛言不得取以比丘作佛事不食佛食有客作之名法亦如是故云不得況乎為佛之子應隨佛學刺血為墨等既不能如是用心反假斯取物是貪慢心犯捨墮罪問經上有飯食犯何事答有慢意故為犯決斷不慢意犯墮釋飯者炊穀熟曰飯食即五噉食若比丘受食就經案上有遺落飯食犯何事也佛言有慢意故為犯決斷以含損壞之由絶永弘通之咎故不慢意犯墮雖不慢心雜用由未深信佛語權且就用故犯罪也問戒律不用流落可燒否答不得不知有罪燒捨墮若知燒有罪故燒犯決斷與方便破僧同亦如燒父母釋言戒律全卷堪以流行或卷部外一章一偈不堪受持流落可得燒否佛言不得以戒是三學之初菩提之本雖不用流落猶為解脫之方如涅槃半偈書於巷陌康莊冀誦持者永為道種故若缺多聞不知有罪燒犯捨墮若聞知燒有罪故意燒者犯決斷罪下引例與方便破僧同以燒毀戒律與調達自立五事方便破和合僧所行五事亦同亦如燒父母之逆罪以戒乃法身父母故四結界品問結界法品第四釋此品問結界軌則法也結屬也界畔也言非法之地僧伽作法立標結屬僧伽界畔軌則不為俗地非法之分齊也良以世間諸事緣具方成況出世勝因豈無託處故僧作諸羯磨必於如法界內能成妙行之緣也故律云非羯磨地不可作法行僧等事按五分云界有三種一攝僧界攝人以同法令無別衆愆二攝衣界令無離俗罪三攝食界攝食以障僧令無宿煮過此界相者若山界相大如須彌山小者如象若石界相大如牛小者三十稱若漫石不得應別安石若林界相言林草體空不堅實者不得若大林乃至百由旬下至四樹重接是也樹大者若閻浮提小者高八寸形如鉢大及城池塹林舍隨有稱之應須義設方法如僧法中具僧集等七緣已方唱相作結界法也問結界為云何答結界法者若山澤無人處隨意遠近若城邑聚落不得遠結亦不得夜結結界時要須比丘四角頭立不得便外人入外人入則界不成先結界場僧家白衣奴子盡著界場上然後視度四方結界時除四處一者聚落二者聚落外俗人田地常作事處三者若有阿練若獨處山澤恐說戒羯磨時有種種事難不得來白衆求別結小界衆若聽可彼無五人衆當遣僧與結別界此謂阿練若坐處四者受戒場先結界文均除結戒場除是結界以是其事或先結大界後結戒場於中受戒如戒公所云恐無所獲然云不知同於取別顯通此路可有僥幸其人云若有病比丘不能得往僧中求索別一屋中結界僧亦應聽先解大界與結別界訖然後結大界一切比丘不持衣夜中得入中釋此問僧伽結界之處不一此諸界法云何結也佛答牒云汝問諸處云何結界法者若山下答所問六意也一者若所結之界在山間水澤無人妨礙之處隨意遠近皆得故律云若布薩界極廣三由旬不得過若過不成得罪二者若所結之界在都城縣邑聚落之中有人妨礙之處不得遠結齊於墻柵之處三者若城邑結界時豈唯不得遠結亦不得夜結以僧不知大小屈曲之邊畔故唯日中了然故四者言清衆作法結界之時沙彌須出況乎外人故以比丘四角頭立不得使外人有入入則不成以不合佛清淨軌則故五者言城邑結界宜隨住人當於未結之先僧家人等盡著界場上然後視度四方之界相豈唯住處合宜亦妨失衣破夏之緣又唯此羯磨無與欲法恐不知相有於過故六者言結界時除四處初二結界開出有人不得遠結三四二處開出別界初者言聚落處有市易故又一家一村亦名聚落於此村中齊墻柵處併外勢分名為界畔此界內比丘同集在手相及處違教者得越法罪二者言除聚落外界用中人擲石以還而不遠結以俗人田地常作事處故三者言布薩界遠若有阿練若獨處山間水澤恐說戒羯磨時有種種事難不得來者應白衆求別結小界衆若聽可彼無五人衆當遣僧與結別界此謂阿練若坐處其蘭若界量極小方圓七槃陀羅一槃陀羅二十八肘若結小界不得說欲結布薩界亦不得說欲結界場極小容二十一人作界場已後起屋覆界不失四者受戒場先結界文均除結戒場者言時諸比丘有須四人衆羯磨事起五人衆十人衆二十人衆羯磨事起集會疲極佛言聽結戒場稱四方相若安橛若石若標作齊畔五分云須在大界前結由此受戒場先結界相之文四方均等除之次以大界場內外相圍之結大界場故毗尼母云必以大界圍之除是下結也言除是內裏一重標戒場內相中間一重標大界內相最外一重標大界外相結其大界以是如法之事也有時或先結大界後因衆多羯磨事起方結戒場於中受戒等事猶如大界中之公所也云者言界內僧云既先結大界後結戒場恐有無所獲知戒場以戒場之相非一時唱故然云不知同於阿蘭若白衆取別結小界顯通此戒場之路可有僥幸知也其人云者言其界內人云若有病比丘於布薩時不能來者求索別一屋中結界僧亦應聽之文云大德僧聽若僧時到僧忍聽別一屋中結小界白如是先解下明結之法言若結小界時先解大界與結別界然後結大界如上先戒場後大界也一切下明大界有不失衣界言大界結已一切比丘不持衣夜中得入別界屋中蓋不失衣界依大界結故也故根本云為不失衣依界秉羯磨欲令安樂住元由老病緣雖復離三衣界中別處宿除其村勢分隨處任遊行有一住處有界一比丘亦可打犍椎廣說戒先向四方僧懺悔然後亦可三語三語者謂三說釋此文缺問否答三字言有一住處有大界打犍椎集僧廣說戒法若唯一比丘於布薩時亦可打犍椎廣說戒否佛答云若大界唯一人先日向四方僧伽懺悔至時然後廣說亦可三語說三語者謂三說文云今僧十五日說戒我某甲清淨問結界得通佛地結否答不得於中受戒若先不知法已受得戒師僧若知故違有罪釋言僧結受戒場界而場地窄者得通大界中佛地結界否佛言不得於中受戒即用佛物故若沙彌先不知律法軌則已受得戒知軌則法不得戒言三師七僧若知破軌則法故違而授者有罪即墮也問行船船上得結界否答得若有沙彌白衣驅著岸上然後結界若不驅出當障隔著一處然後結界結界後夜不持衣不得入中釋界法二種皆有所依處既無憑雖有羯磨功無就矣若比丘行船時有羯磨事起既無所依船上可得結界否佛言得者以法起託處界為勝緣隨在之處皆為所託若云船動有相皆遷但合律文故皆得也律云若行船布薩應下矴若下樁不得繫著岸若崩岸有大樹根在水中不得繫著樹根若擲水內有樹根應斫去若不斫去與陸地相連若水中大石或樹或浮木悉是水所攝也若作法時有未具戒者驅著岸上然後結界若船行不能驅逐當障隔一處然後結界結界後有別比丘不持衣不得入中以無大界中攝衣界故問大僧盡行唯有沙彌在界為得否答但有一清信士界便不壞況沙彌盡無一宿界壞若僧盡去不還亦不須解釋言界由僧結須假僧持僧既盡行唯沙彌在界為得不壞否佛言界之存沒不在師資但有人時界便不壞況沙彌也若盡無道俗等不唯多時一宿便壞故知界既係人若僧盡去不還界法壞矣亦不須解以律有結解故問賊來界裏殺比丘界壞否答不壞釋賊害也言賊害人身財故蓋界是如法之地羯磨勝緣界有非法事無所託若賊來界裏殺比丘界可壞否佛言不壞以結時須當清衆有俗不成今是住時故云不壞又賊為殺事餘衆不無設僧非為界無損故問一人三四人行道或在白衣家得結界否答不得五人以上得結界釋言律制結界五人以上是其軌則若一比丘人或三四比丘人行於道中或白衣家有羯磨事得結界否佛言不得須五人以上方得結界故問結界得通流水池水結否答一切亭水盡得分流不得以不知齊畔故釋言僧結界近於水時可得通於流水池水結界否佛言一切亭止之水盡皆得結故白一羯磨云佛言若諸河間有橋梁者得結界異此便非故若分潮流之水通水入田若王治化五日一雨江水皆不得是以不知齊畔故問結界後不打犍椎界壞否答不壞釋犍椎聲論翻為磬亦翻鍾又五分云隨有木瓦銅鐵鳴者是也增一云阿難升講堂擊犍椎者此是如來信鼓也初鳴時當依經論建心標為必有感徵應至鍾所禮三寶訖具議立念我鳴此鍾者為召十方僧衆有得聞者並皆雲集共同和利又諸惡趣衆生受苦令得停悉故若僧結界之後不打犍椎其界壞否佛言不壞以界成壞在人有無非干聲鳴界成壞也問結界得通王路結界否答得當結時遣人兩頭斷行人然後結界釋言俗人田地有妨羯磨故不遠結若僧結界近於道畔勝於前妨可得通達王家官路結界否佛言得者以界雖通路無礙僧伽故但當結時須遣人在兩頭斷絶行來之人然後結界若入田路向井取水路窮路皆不得作界相若大路或車步路路斷者經三四村皆得作相也問無主地可得結界否答得便如單越法釋無主地者言無主人所管之地夫比丘所須皆當乞之離不與取若於無主之地無可乞者可得結界否佛言得者以既無主地免於偷愆故便如單越法以北洲人不執我所故問先結界後有大水或掘坑長十五步或復於中行欲此界壞否答盡不壞其人云假使掘大坑深廣一由旬界猶不壞況小小坑耶釋言僧先結界如法結後有大水或掘大坑失壞託處又行欲事此界壞否佛言水坑淹損界相無傷人有非法界亦無損其人云者是佛預教比丘止其掘坑之人言也若末世有是人者比丘應語其人云假使掘坑深廣一由旬界猶不壞況汝小小十五步之坑耶問比丘得比丘尼界裏宿否答得亦不得失衣但不得入其房內耳釋尼八敬戒中有近僧安居是知二部界別以遠嫌疑及犯事故設被僧差教授不至日沒而回違者犯墮若比丘或有病緣及行道中可得比丘尼界裏宿否佛言得者以戒雖遮緣必開故縱許得宿亦不失衣繫緣守戒故界之四方可宿但不入其房內耳若故入者隨事結罪也問僧結界竟後來僧共住不持衣失衣否答不失當結時已通三世僧故釋言僧結大界則隨界結攝衣界皆已竟故而後來僧共住身不持衣為得界法不失衣否佛言不失者以當初為四方僧結大界及衣界時即已通於三世僧故問僧不盡集得結界不答若有事囑授得無事不得釋言結界盡集知界分齊若僧有三寶緣而不盡集得結界否佛言若有緣事當囑比丘授某事與僧所欲結界者得若無緣事不盡集者不得也問一結界得幾時答不限年數若施主要增地更結耳釋一初也幾時者言幾多年月時也如師資授受皆有時數若檀越施地僧初結界得幾時也佛言師僧具臘學堪利人受戒定時能堪一食今之結界不於餘同故不限數除若施主要增界地可更結耳反顯不要增者不限年數也問先僧結界不解而去後來僧得於中結界否答得釋言結界解界是為如法若先僧結界不解而去界相猶存後來僧得於界相之中重唱結界否佛言得者以先僧不解一宿便壞由無持法人故所以後僧得結也問結戒場時要須集一切僧為隨意多少答五人以上得以無大界故衆不集無犯釋僧結大界須盡集僧若結戒場亦同盡集衆僧為當隨意多少也佛言大界盡集為知界畔離破夏等緣此無是意但集五人以上得何者以無大界故衆不盡集所以無犯若大界不集犯越法咎問結界場要須至場上亦得遙結耶答要須至場上乃得結耳釋言僧結界場當盡集之或有緣而身不至為須要至場上可得遙遠結界耶佛言以遙結與不集無別必須要至場上乃得遙耳問二衆結界得互相叉結否答不得相叉得共通結耳釋互相叉者言如兩手互相叉也尼界近僧遠約由旬近三五里若二部之衆皆欲結界其界相錯可得彼此之界互相叉錯結否佛言不得相叉以譏嫌混濫故可得二界相共通達結耳問一界裏得鳴二犍椎否答得但不得二處說戒及以羯磨種種僧事唯得燒香飯食而已釋界法僧集須打犍椎若一界裏可得鳴其二犍椎否佛言得者以界廣大二處得故但不得二處說戒及以羯磨種種僧事何者以律云此一住處一說戒故若二處說戒等即有非法羯磨非毗尼羯磨非法別衆諸事皆起若鳴二椎唯得燒香飯食而已問大僧得與尼通結界否答得釋言檀越欲供二衆鄰於結界其大僧可得與尼共通結界安居否佛言得者以二界通達彼此歷然以順施主福田故五歲坐事問歲坐事品第五釋歲越也言越故限也說文曰木星也爾雅夏曰歲星歲星行一次也木星謂之歲星與年謂之歲義實相因以其一年行一次十二次而周天故曰歲星此星行一次而四時之功畢故年謂之歲托華鈔云諸律中以七月十六日是比丘五分法身生來之歲則七月十五是臘除也意謂望日五分臘除十六日新受五分法身之歲也表比丘修證五分與歲並增故云受歲是以比丘出俗不以俗年為計乃數夏臘耳按戒文歲約五分生來義言通於多時臘約修證義言別於一夏坐者止也行坐之對也謂春秋遊行利他夏冬坐止自利也前代譯經律者或云坐夏坐臘等斯皆邊裔殊俗不達中國正音或方言未融而傳譯有謬故以四月十六日入安居七月十五日解安居也安居者形心寂靜曰安要期住此曰居行事鈔問何為但結三月者一生死待形必假資養故結前三月開後一月為成供身衣服故二若四月盡結則四月十六日得成若有差脫便不得結教法太急用難常準故如來順物始從十六日至後十六日開其一月續結令成故安居名是正稱也問夏中幾日得結坐答從四月十六日盡五月十五日日日可結此謂坐初有事難不得結或五三四日乃至一月盡不失前坐此名三十日結坐一日受歲後坐人唯得一日結坐過七月十五日有事難日日可受歲盡八月十五日此名一日結坐三十日受歲釋言夏中雨際之時而有四月若前後三月夏坐者有幾日得結坐也此影問於受歲日也佛言若前坐人從四月十六日盡五月十五日日日可結此謂下明得結之意以坐初時有諸事難不得結坐或五三四日乃至一月盡不失前坐此名下結也言此上之緣名前坐人三十日結坐一日受歲也結坐受歲文如羯磨部中說若後坐人唯五月十六日結坐應至八月十五日滿若過七月十五日於十六日有種種事難日日可受歲盡八月十五日此名下結也言此上之緣名後坐人一日結坐三十日受歲也問結坐受七日法為坐初受為臨行時受答若坐初受者好坐初不受亦可臨行時受夫受七日法行不滿七日還後行不復受計滿七日乃復更受若慮忘亦可日受釋言前後結坐有緣皆開若結坐已有三寶等益人之事此七日法為是坐初受為臨行時受耶此受法文云是但對首法應具威儀白言大德一心念我某甲比丘今受七日法出界外為某事故還來此中安居三說若事是半月等方作白二羯磨若受日多者同緣受者二人三人應一時羯磨羯磨鈔云凡受日緣務要是三寶請喚生善滅惡者聽往若請喚無利益三寶非法破戒有難雖受不成佛言若知夏中有三寶事者結坐之初先受者好若初疑之不受亦可臨行時受夫受下明受法及不滿者之制鈔云謂縱令前事唯止一日皆須七日法律云不及七日還聽受七日法夏末一日在亦作七日法若準律意及即日還可白同意出不受明矣若按鈔等事唯止一日皆須七日法此與聖制皆急者何也良以諸師鈔律恐人以小事頻白而出界掛安居之名故云皆也原夫坐初臨時受法行滿有後緣出者須更受也若不滿還者後行不復更受計滿乃復更受若思慮忽忘者亦可日日受也問夏坐中不受牀坐房舍十二物得坐否答不須受釋受者言比丘衣食等事皆有受法表有證人故十二物者按根本部安居分房舍法差分十二人一飯二粥三餅果四臥具五諸雜事六藏器物七衣八分衣九藏雨衣十雜遣使十一房舍十二分臥具及以褥席若比丘於夏坐中不受牀坐等為得坐否佛言不須受言受七日法離於破夏有利他益衣食受者離不與取有自利益此房舍等雖云助道已在僧中例上無功故不須受也問結坐而不坐得歲否答若先不知坐法受歲得若知故違不得釋結坐者律云比丘無事遊行妨修出世導業鼠尚知窟穴沙門何不知時愍物行慈故應結坐不坐者言比丘雖兩兩相對結坐而不如法坐止無緣界外行故得歲者因如法坐有得禪定及於聖果罪滅福生故若比丘結坐而不如法坐止得受一臘歲否佛言若比丘先時不知夏坐之法所謂晝則勤心修習善法無令失時初中後夜亦勿有廢者受歲得也若知坐法故違而不坐者不得受歲問都不結不坐受歲得否答若先不知有結不知有坐法受臘得知有結便應向僧懺悔若先知法故違不得釋臘者獵也於此月中獵取禽獸以祭其祖從事而立故名為臘又接也新故交接之謂言比丘獵取資糧加行有日新功能故若比丘前後安居都不結坐及不夏坐無智斷益受歲得否佛言若比丘根鈍先時不知有結不知有坐法受臘者得姑容受之以待次臘如法故若結坐後知有結及坐便應向僧懺悔此不學戒以波逸提懺之若先知結坐二法故意違之不得受歲問不結而坐得歲否答同上事釋言比丘於夏首不結坐而於夏中坐法無虧得為一歲之功否答同上事以根鈍故先不知有結坐之式而坐法無虧得為一歲若後知有結法便應向僧悔云大德一心念我某甲不學戒故不知結坐法今知有結法向大德發露懺悔憶念我清淨布薩戒身具足三說若先時知有結法不結而坐故違不得受歲同於外道以非如說修行故問夏坐中得入流水池水浴否答界內盡得若受七日行過水亦得釋浴者律制半月洗浴唯除熱時不定若比丘於夏坐中可得入於流水池水浴否佛言界內盡得以符律熱時故意含界外不得以非如法之緣故若受七日法界外行過水亦得問夏中犯決斷不悔受歲得否答雖有罪得歲所以爾者故是比丘故釋言比丘於夏中是修道要時若犯決斷而覆藏不向僧伽懺悔同僧受歲得爾否也佛答雖有罪得歲所以爾者何也若犯決斷故是比丘故又不悔者但無一夏之功不無一夏之歲以明犯棄者受歲不得問受歲不和合得歲否答要先懺悔然後受歲若其人不悔擯出得受若不擯出衆當三諫過三諫不受犯決斷過四諫犯重若力能驅逼出界好若其不出當牢閉著一房中然後受歲無苦以其非復比丘故若惡人多衆所不敵當避出界若共受不得歲釋不和合者應來者不來應與欲者不與欲應呵者呵謂僧伽受歲和合方成若不和合僧得受歲否佛言要懺悔清淨等方得受歲共有八事一懺者言僧不和合若作羯磨有非法非律非毗尼之事要先懺悔清淨和合然後受歲二擯者若其不和合又不懺悔之人妨於衆故須擯棄出界僧得受歲三諫者僧若不擯衆當三諫使悔清淨受歲四過者言僧雖三諫不悔又過三諫至於四諫不受語者是惡性人犯決斷罪五過者言僧雖已四諫而又過四至於五諫者犯重六驅者言如是犯重之人若僧伽有力能驅逼出界者好善受歲七閉者若僧不能驅其人出界者應當牢閉著一房中然後受歲無苦逼於僧故此人罪重擯驅不出以其非復比丘故八避者若不和惡人多善衆所不敵當避出界受歲若不避而共受者必不得受歲以有非法等諸事故問夏坐中得為亡師造福否答得但不得手自造事釋福者殊勝之義自體及果但可愛樂相殊勝故名為福業謂比丘於夏坐中若值亡故之師忌辰惟濟之恩而欲伸報答得為亡師造為經功福事莊嚴報地否佛言得者以師恩最重造福而悼之表於孝心故但不得自手造事可託人為以所報小故若手自造妨修道行以所報者大故問夏中得捉扇拂否答一切毛不得捉竹扇得釋扇者箑也自關而東謂之箑自關而西謂之扇言扇箑除熱故拂者拭也言拂拭蚊螢不傷生命故謂比丘於夏中極熱時得捉扇拂否佛言凡一切毛扇拂不得遠有損傷故唯竹扇得以無損傷故問後坐人得七月十五日受歲起去否答不得若先不知已受得歲若知法故違不得若已和合僧就受籌而已若後坐人受歲時前坐人亦爾釋言比丘結後坐夏當至八月十五時滿得與前坐人於七月十五日受歲起去否佛言不得以坐及二月夏分未滿不得與前坐人起去故若後坐人先不知滿與不滿已隨前坐人受者得歲若知法是八月望日滿者故違不得若前坐人已和合後僧就籌而已待至日滿而去如前坐人不和合不令受籌後坐人又如何耶若後坐人受歲時如前坐人亦爾問二人同臘小者前坐大者後坐前坐者已受歲後者未受於一月中何者應大答先大故大計本日故釋臘者乃僧伽尊卑之衡猶朝中序爵鄉黨序齒也謂小大二比丘同坐夏臘小夏者前坐大夏者後坐前坐者已受歲後坐者未受歲於一月中若以臘別尊卑此二人何者應為大耶佛言雖云同臘先受還以先時大幾夏者故為大夏之上座也以計本始受戒之日以定臘之尊卑不以受臘而分大小也問夏中不受七日法暫小小出界故得坐否答懺悔得釋言夏中受法出界二利無虧若比丘於夏坐中不受七日法暫時小小事出界是破夏緣故得夏坐否佛言懺悔得律云小出界外白同意知以不白故犯越法罪故須懺悔得夏坐也問夏中一因緣得三受七日否答言得釋謂比丘於夏坐中有一因緣受七日法而事未終又受七日猶未終竟可得三受七日否佛言得者以緣事未終故問夏中不坐或十人至十五人欲來寄住共受歲得共住共受歲否答若及後坐當結若不及後坐不得此人若全不知有坐法得容若知有故違不得釋謂比丘於夏中不結坐或十人至十五人欲來前坐界中寄託而住共受歲前坐人得與共住共受歲否佛言若不結坐人及於五月十六日後坐者僧當為結後坐而坐若不及後坐者不得也言此人若全不知有結坐法者得姑容之共住受歲若知有坐法故違者不得問夏中坐若為三寶事若疾病種種衆難得移坐否答得坐當白衆中受三十九日法三十九日已有事便出界三十九日法三十九日滿得還好若不得亦可彼處受歲無犯若坐初不受臨行時亦得受若坐已滿三十九日者事便出界不須復受若不還亦得於彼處受歲釋謂比丘夏中如法坐若為道俗三寶之事若疾病之事種種衆難之事須往它方月餘得移坐否佛言得者以坐定制緣事必開故當白下明移坐法按根本律云佛言其安居人不應出界若有緣事須出界者應受日去若七日法應三白如常守持而去若七日不了應受半月乃至四十夜白二羯磨守持而去極多唯得四十夜不應過如世尊言多在界內少在界外是故但守持四十夜意明多在外少在內不成安居謂當白衆中作白二羯磨受三十九日法其文如羯磨中說若受三十九日已有事至者即便出界至彼守三十九日法應諸緣事言三十九日滿者明此彼受歲法若比丘至彼三十九日滿者得還界受歲好善也若三十九日滿緣事未終受歲又近不得還者亦可於彼處無犯若坐下明移坐受法若知夏中有緣當於結坐時受若坐初不受臨行時亦得受之若坐下明不受法及受歲法也若比丘結坐已滿三十九日者有緣事時即便出界不須復受三十九日法以不及此處安居自恣故若不及還者何處受歲亦得於彼處受歲問不結坐或不受七日已受臘得否答不知法已受得臘不得夏若以夏僧一諫取好過三諫不取犯戾語決斷懺還取得當取時白衆然可得釋謂比丘於安居日不兩兩相對而結坐或結坐已不受七日法私出界外隨僧已受臘為得否佛答若比丘不知結法及受法已受得名一臘不得一夏之功謂不知法者若以夏中僧一諫取結法者好文云大德欲如法自利當結法受法不宜違教若違教者即慢佛語慢佛語者不善大德當信佛語勿不結坐及受法也取好者言彼取諫言者好善也此一諫二言疑之有落何者應云若以夏僧一諫至三諫取好以次文中有過三諫故若過三諫至四諫而不取者犯戾語決斷懺還取得者言雖有犯罪懺悔之還取諫言得臘正當取時要白衆僧然可者得臘若不然可者不得臘也問比丘不受歲犯何事答一比丘不受歲衆諫使受一諫至三受好若過三不受犯決斷過四不受非沙門以不肯受法故釋受歲者言夏坐比丘自有愆失恣任僧舉有罪滅福生之益故受歲也謂比丘於夏滿時不自恣受歲犯何篇事佛言若一比丘不受歲衆僧諫之使彼受之自一諫至三諫受歲者好善若過三至四諫不受歲者犯決斷罪又過四至五諫不受歲者非沙門即名俗人犯棄罪也以不肯受如來法故問夏坐新受戒人日中後結坐得歲否答得唯後夜不得釋謂前後夏坐皆九十日得為一歲若夏坐時而沙彌新受戒人於日中分或日後分方結夏坐其九旬期少一二分得名一歲否佛言得者以結時有其中後而一日未終故唯後夜不得者一日已竟九旬不滿故影顯初中夜皆得也問夏中坐忘不受七日法一出行得坐否答憶即悔得一坐不過二三悔過二三悔不得歲釋謂比丘夏中如法而坐或有因緣忘不受七日法一出界外行得為夏坐否佛言若出界已憶忘受法即悔得坐雖云悔得以一坐中不過二三悔可得夏坐若過二三悔者不為得歲以過二三即名非法尚不成坐況得一歲之功也問受歲時若天雨得屋下受歲否答得釋受歲露地者表坐夏功期出三界露地坐故言比丘受歲時若有天雨可得屋下受歲否佛言得者以表比丘自恣時將斷未斷猶居界內故問既至某方結坐有礙不達得進遙結坐否答不得正可到彼結後坐若道路有僧住處便應就坐過二三日治房舍然後受三十九日去若無僧住處五人以上共結界坐然後坐留一二人守界滿三十九日乃得去若後人不滿三十九日去者前去人不知不失坐後坐人失釋某方者言所期之處也有礙者言有難事阻礙也進前也謂比丘心所期處而結夏坐及既至某方有所礙阻而不能達其界可得進前遙結坐否佛言不得以兩兩相對名為結坐若界前遙結以無兩兩相對故待無礙時正可到彼結後坐也若道下明前坐結法也若比丘必欲前坐者若道路中有僧住處僧應就之結前坐住二三日修治房舍然後求僧作白二羯磨受三十九日法去若無僧住處有五人以上共結界而結前坐然後先著二三人受三十九日去留一二人守界滿三十九日乃得去若後留人不滿三十九日去者前去人不知不滿日去不失前坐後留坐人失前坐也問一人至四人得白衣家結坐否答不得五人以上得釋若一比丘人至於四人可得白衣家結坐否佛言不得以一人無所對受結坐法人故又結界不成故二三四人亦結界不成故五人以上得者結界結坐皆如法故又自恣時五人須前後單差若有六人一時雙牒而作羯磨故問一人靜處得結坐否答先有結界二人以上得一人以不得無人共受坐故無界盡不得若欲別坐當更請僧結界坐然後得釋一人以不得句擬以字在不得字下以無人共受坐故謂一比丘於阿練若處得結坐否佛言若靜處先有界須二人以上得一人所以不得以無人共受坐故若靜處無界非唯一人及二人以上盡不得若欲別於僧處結坐當更請僧結界坐然後一人得也問比丘夏坐中得受請他施及受他寄物或經十日至三月得爾否答作不貪受不限時節釋謂比丘於夏坐中不受衣財妨修道業除急施衣止開十日若檀越捨他比丘施併他比丘寄物比丘可得受請他人之施及受他比丘寄放之物或經十日至於三月得爾否也佛言若比丘作不貪畜之念而受者不限時節何止十日三月耶問夏坐中界內作有為事得應坐否答福事得指授餘不得釋夏坐中界內應修三無漏學是如法事若比丘於結夏坐中不修無為之行而於界內作有為之事得應坐之功否佛言若三寶福田事指授他人非宜自作況餘非福之事不得應坐也問受夏坐人云何房舍破當補治為謂始坐坐訖時耶答三月中破即治釋比丘修頭陀行住處有五蘭若樹下冢間露地常坐極於無所受真抖擻之行若受夏坐人云何受於房舍此房舍破當補治為謂是始坐坐訖時耶答言夏中安居值雨際時當依房舍故佛告諸比丘若欲入夏坐者先修治房舍若無房舍者突吉羅是故夏坐得現房舍者善若無應倩人作不得無房舍而夏坐何以故過去諸佛皆受房舍故若房舍破即補治以不於始末時故問受歲時尼來界內求索受歲應與受否答二尼以上得一不得所以爾者以尼獨出界犯重故釋謂大比丘夏滿受歲之時有比丘尼來於界內求索衆僧自恣受歲應與受否佛言二尼以上得與受歲以合如來八敬戒中請自恣之戒也一尼不得與受所以爾者何也以尼衆獨出外行犯僧殘之重故六度人事品度人事品第六釋度脫也人忍也於世違順情能安忍也言比丘度脫於人離俗入道故佛制比丘欲度人時須滿五臘知五法堪教誡人故律云滿十臘當得度人若不知五法盡命不得度人五法者一者廣利二部戒二者能決弟子疑罪三者弟子遠方力能使弟子來四者能破弟子惡邪及教誡勿使作惡五者若弟子病能好看視如父養子若不知五法終身不得度人度人者得突吉羅問一人得度沙彌否答二人得釋沙彌者梵語此云息慈息諸世間貪染煩惱慈悲利益一切有情謂佛命鶖子度羅云說三歸十戒為沙彌之最初若滅後亦以一人為師得度沙彌否佛言二人得者以舍利羅云非同常例如佛命弟子稱之善來除羅云已後須具二師一和尚一阿闍黎堪得度也何者以和尚親教出離之戒法闍黎教誡軌則之範法故問度沙彌得遙請和尚否答不得釋遙遠也和尚者梵語塢波陀耶此云親教師于闐國稱和尚此云力生謂三乘道利五分法身因師之力而得生故謂比丘欲度沙彌請親教師為授歸戒而此師住遠可得遙請和尚否佛言不得以授戒度人須師資相親為彼著裙撿知二根不男為說歸戒有授受義故又馬鳴頌云彼師及弟子當互審其器若不先觀察同得越法罪問未滿五臘度人犯何事其弟子為得戒否答若知非法而度犯捨墮過三諫不止犯決斷若弟子不知是非法得戒若知不得釋五臘者由比丘一歲二歲為授具足戒不知教授弟子不案威儀將至佛所問汝幾歲耶答云一歲佛呵云汝自未斷乳云何乳人自今已去聽五歲十歲度人若未滿五臘影於不知五法度人若比丘未滿五臘而度人於五篇中犯何篇事若師違教而度人其弟子為得戒否佛言若比丘知未滿五臘是非法及未知五法而度人犯捨墮過三諫者有比丘諫云大德佛制滿五臘知五法度人若未滿未知勿度於人度人者不善大德當信佛語未滿未知勿度於人不為智者呵責受福無量長夜安樂如是過三諫不止犯決斷罪若弟子不知其師是未滿五臘不知五法得戒以無餘覺餘思故若知不得以有餘覺餘思故問比丘都不誦戒又不知法種種僧事而多度人或作三師有所犯否答此人尚不應食人信施況復度人釋謂比丘於黑白之月都不誦戒又不知作法中種種僧事而多度人或作三師有所犯否佛言此人不誦戒不知法事即無己利之德尚不應食人信施況復度人若食信施者犯盜若度人者犯捨墮問若人父母王法不聽比丘盜將去度犯何事答犯重若官人走奴投比丘為道比丘若知而安止來度亦犯重釋父母王法不聽二輕遮者若知俱不聽遮之不度若度知之則姑容止故謂若人欲出家父母王法皆不聽許而比丘盜將去度犯何事佛言犯重以盜離父母國王之處即不與取故若官人走奴自己來投比丘為學道故比丘若知不應安止即應遣去若知而安止未度亦犯重以取有主之物故問若兒前出家父母後出家來投其兒得度否答得釋出家者謂出有為耕田種植販賣種種事業之家趣入於無為無諸俗事業寂然無欲之家其無為所作業務有三一坐禪二誦經三勸化衆事若不行者徒生徒死有受苦之因若人之兒前已出家父母後出家來投其兒其兒得度否佛言得者以出家之事入理為宗若與道同不存俗禮例佛度姨母故云得也問犯戒比丘得度人否答若犯重無復度人之理若犯決斷同上未滿五臘者若犯餘輕戒要須懺悔然後得度釋若知請戒僧法五臘滿者雖爾許度或後違犯戒法比丘得度人否佛言若犯重戒不共清淨比丘而住是以無復度人之理以非沙門故若犯決斷同上未滿五臘者良由決斷行別住行中不受眷屬事故若犯餘三篇輕戒要須懺悔然後得度含不懺者不得度人問白衣投一比丘欲出家比丘即受更為請和尚戒師所投比丘故是師否答非師若後從受法者可為法師若依隨者可為依止師釋謂白衣來投比丘欲出家比丘即受納為弟子更為請和尚戒師授其歸戒其所投比丘故是師否佛言非師以所投者未與授戒非是五分法身之師若後從授戒法者是為五分法身之師若依而隨止者可為依止學律之師也問比丘多度弟子或作二師都不教戒犯何事答犯捨墮昔迦葉佛時有比丘度弟子不教誡多作非法命終生龍中龍法七日一受對時火燒其身肉盡骨在尋後還復則復燒不能堪苦便自思惟我宿何罪致如此苦耶便觀宿命自見本作沙門不持禁戒師亦不教便作毒念瞋其本師念欲傷害會後其師與五百人來乘船渡海龍便出水捉船衆人即問汝是誰答我是龍問汝何以捉船答汝若下此比丘放汝使去問此比丘何豫汝事都不索餘人而獨索此比丘者何龍曰本是我師不教誡我今受苦痛是故索之衆人事不得止便欲捉此比丘著水中比丘曰我自入水不須見捉即便投水喪命以此驗之度人不可不教誡釋多重也言比丘重度弟子或作二人師也都不教誡者根本薩婆多云凡是弟子應勤撿察不應恣其慢情不為白事不修善品如無彊馬非法自居如世尊言汝諸苾芻寧作屠兒為殺害業不與出家授近圓已捨而不問令我正法速時壞滅是故苾芻於弟子處極須撿察如不順教隨事呵責若不可教驅令出去是知度人宜朝夕訓䇿也若比丘多度弟子都不教誡犯何篇事佛言犯捨墮以慢心不教貪眷屬故昔迦葉下引證其事初五句明不教之事命終下明所感之果便自下明追憶前因毒念害師衆人下明捉船之由求船行耳比丘曰下明自受報以此下結證度人之事七受戒事問受戒事品第七釋受者領納之義戒者大戒即白四羯磨戒也言沙彌圓具乞戒羯磨師對諸師前問遮難已方作羯磨先作一白疊事告知次秉三番羯磨問尊證師量度其沙彌圓具事之可否也以三羯磨中遮難等事通前單白中事故名白四羯磨戒也蓋聞佛初成道善來初度於五人廣利無涯羯磨繁興於四海始因犯重及賊住污尼等十三重難之垢間知則弗容受具受知則不可姑容縱彼求道心殷攝在法門無補次或不稱和尚及己法名衣鉢俱無父母不聽乃至官人下使負債病緣等十六輕遮有玷三尊之教知則不宜受具受知則可姑容雖乖聖制之文量其事輕可緩如是二事俱無堪為福田淨器方作白四羯磨領納戒法入三寶數為法王子及於懺悔盜度種種非儀皆屬受戒事也問沙彌犯十戒一二三不悔受大戒得否答若憶而不悔不得都不憶若不知法受得夫受戒法師應問沙彌汝不犯戒否答若言犯即教懺悔若本師不問壇上師應問若都不問師犯捨墮釋犯干也十戒者一不殺二不盜三不淫四不妄語五不飲酒六不著香華鬘香油塗身七不自歌舞作倡及故往觀聽八不坐高廣大牀九不非時食十不捉生像金銀錢寶謂沙彌干犯所受十戒唯一二三戒不懺悔餘皆懺悔受大戒得否佛言若憶而不悔者不得以心有犯境及違教故或都不憶犯若不知受法須懺已受者得戒以無餘覺餘思故夫受戒法師應問沙彌汝不犯戒否彼答若言犯者師即教懺悔若本戒師不問壇上諸師亦應問若都不問諸師皆犯捨墮問已受大戒得悔沙彌時所犯否答得懺悔法同沙彌時懺悔法釋謂沙彌已受大比丘戒可得懺悔沙彌時所犯戒否答得者謂非覆藏而不懺故但懺悔法還同沙彌時突吉羅懺法不同大比丘之懺也問沙彌壇上欲受大戒或著俗服腳著履屣或衣鉢不具假借當時為得戒否答惟俗服師不問不得其餘盡得師僧犯捨墮釋謂沙彌受戒宜法服脫履全道具若或著俗服腳著履屣或衣鉢不具假借當時為得戒否佛言惟俗服戒師應問恐是破內外道故若不問不得其餘盡得雖然盡得而師僧犯捨墮以慢佛教故夫受戒脫屣表不履俗塵故所持戒體假衣鉢相而攝持此緣宜當自具以表其誠若或假借乖儀是虗應故事而已問若有比丘不捨戒作沙彌或即大道人而更受戒否答不得問若不得戒前所受戒故在否答在問後師故是師否答非釋捨戒者律制犯重者求清淨須捨戒作白衣沙彌而更受戒捨戒文云大德僧聽我從今日不持大比丘戒如是至三不捨戒者謂比丘不捨大戒作沙彌也若有比丘不捨戒作沙彌或即於大道人而更受戒否佛言不得以不捨戒故若受不如法亦許更受如晉時有慧照等三百七十人因僧伽跋摩至重受具足或問其意照曰以疑先受若中若下更求增勝故須重受依本臘次後智磐述曰此由照等先受戒不如法故於船上結界攝僧以便行事耳今人年少輕心受戒不知方便不能有所感發尚未霑於下品則於再受誠得其宜薩婆多論云重受增為上品本夏不失若此則中下尚須增受況未能感發者乎或問先已聞羯磨今若再受則先聞成盜聽者然於當時輕心無知既不能領聖法尚何盜聞之咎明律高德更須一評問若不得戒已前所受戒故在否佛答言在以未捨戒故又問若先戒在者後受之師故是師否佛答非師以非受戒法故問多人受戒而併請一人為師可得十人五人一時受戒否答無此理釋受戒者一人二人三人為師者三師七證然師資數有所表也蓋具戒功大入三寶數非同餘戒一人二人須以十師作十方佛想而授與又圓成三衆舉撿七非故以十人也比丘戒是聲聞之小乘緣覺之中乘菩薩之大乘共因此戒而成果故人天之乘無此分故通別圓機攝大乘故機雖多種不出此三四五六等無所表故是以經云於一佛乘分別說三故以一人二人三人也若多衆之人受戒而併請一人為師可得十人五人不以壇時前後一時受戒否佛答無此理者總斥師資無此理也師無理者母論云優波離問佛有幾處白四羯磨受具而得滿足佛言有五處而得滿足一者和尚如法二者阿闍黎如法三者七僧清淨四者羯磨成就五者衆僧和合若一人為師者故云無此理資無理者律云若秉一羯磨一界四人受此是僧為僧不名為受法又優波離問佛可得二人受戒否佛答得又問誰大誰小答無有大小又問可得三人受戒否答得又問誰大誰小答無有大小又問可得四人受戒否答云不得以非衆為衆而作羯磨與理相違故若有十人五人須異時次第受若一時受者故云無此理也問沙彌更受大戒請一比丘為大戒師而此比丘不知羯磨法及受戒法更與請一人與受戒以何當為師答與受戒者是師無戒法與者非師釋為戒師者深明三觀精練二持五德十數說行兩遂德臘具足堪為戒師若沙彌更受大戒請一住處比丘為大戒師而此比丘不知羯磨法及受戒法更與請一住處僧人知白四羯磨及受戒白法請法與受戒此先後二住處人既皆受請以何當為師耶處答此二處人與受戒者是師以是法身父母故無戒法與者非師以無生長法身義故蓋前問已答一人為師無此理故問壇上師僧或著俗服或犯禁戒受戒者得戒否答若受戒人知是非法不得不知得釋壇者出土為壇而於此三級之上受者表受戒者當出三界故又壇是清淨之地表受戒者當處清淨心地也謂沙彌壇上受大戒時三師七僧或著俗服或犯禁戒受戒者為得戒否佛答若受戒人知其師僧是非法者不得以有餘覺餘思故經云有一不清淨者汝戒律儀必不成就不知得者以無餘覺餘思故問受戒為有時節否答唯後夜不得初夜中夜無燈燈亦不得要須相覩形色乃得釋節止也謂沙彌受戒為有時節否佛答若年月中日日夜夜皆得唯夜夜後夜不得以後夜時恐及彼此之日難計臘之長幼故又後夜昏睡恐無所獲故雖開初中二夜須然燈燭無燈燭亦不得要須相覩形色乃得以師覩弟子識其無根二根諸病等弟子覩師識其尊卑大小也問受戒時或值天雨更移場屋下受戒得戒否答若欲移場當先解大界更結戒場乃得受戒不爾者不得釋戒場無屋者表受戒人當出三界無所覆故謂沙彌受大戒時或值天雨更移場於大界內外相中屋下受戒既無所依之戒場受戒得戒否佛答若欲移戒場於大界中屋下者當先解大界更結戒場有所依之託乃得受戒表受戒人猶在修持居於界內故不爾者不得以無所託之戒場故問受戒時或有事難不得究竟是大比丘否答但三羯磨訖便是釋謂沙彌受大戒時或有事難不得究竟作法是大比丘戒否佛答謂僧但作三羯磨竟僧云作法善成即有事難不得究竟四隨四依者便是大比丘顯三羯磨未終併問遮難俱不是也問受戒盡十三事後諸戒師和尚不續教誡得戒具否答若師不教誡至十五日說戒專心聽受便得具足釋盡者竭也十三事者毗婆沙云白四羯磨竟已得具戒所以說四墮四依十三僧殘但為知故說也若受具戒要白四羯磨而得具戒不以三歸也凡具戒者功德深重不以多緣多力無由欲得是故三師七僧白四羯磨而後得也何以故但說四墮等不說餘篇此二篇是最重者一篇戒若犯互不起故二篇雖起難起若波利婆沙等二十衆中而後出罪若難持而能持者餘易持戒不須說也是故但說二篇不續教誡謂沙彌受大戒說四墮四依盡十三事後諸戒師不續教誡似無所受得戒具否佛答若諸師不續三篇教誡有疑者至十五日僧說戒時專心聽受即得具足問受戒三衣不具有持衣直或染不染或裁不裁得當衣否答盡不得釋謂律制受戒須具三衣形服相稱攝三業之惡成十善故若沙彌受戒三衣不具有持衣直或染不染或裁不裁可得當衣否佛答盡不得當衣以衣體與名不相離故若不當衣為得戒否薩婆多毗婆沙云須除鬚髮著袈裟問不除鬚髮得戒否答得戒但非威儀若無衣鉢得戒否答得戒問若無衣鉢得受戒者何故必須衣鉢答一為威儀故二為生前人篤敬心故如獵師著袈裟鹿以法服故則無怖心故三以表異相故內德既異外德亦異故問受戒時衆僧難得限齊幾僧得受大戒答除三師五僧以上得釋限齊量也若沙彌受戒時三師是可限量而七位僧伽難得限量齊幾僧得受大戒耶佛答謂十師之中但除三師若尊證五僧以上得此七證人表舉撿士非何不直云七僧得而云五人以上得者若證僧不足七人或可五人以七逆中破僧出佛身血佛滅後無故云五僧問沙彌曾詐稱為大道人受大比丘禮後得受大戒否答不得釋謂沙彌時曾詐稱為大道人受大比丘禮拜即犯賊住之難後得受大戒否佛答不得者以詐稱受禮令彼比丘生不正想即與未證未得而為證得正相同故若已受戒即不共住若未受具即不得受故經云若受大僧禮者各偷臘賊住又律云有師出家受十戒未受具或往他方言十臘二十臘次第受人禮入僧布薩及一切羯磨受人信施是名偷和合也問沙彌辭師行事難不得還輒於彼處請依止師受戒得戒否答得戒釋沙彌辭師他行有事難之阻不得回還輒於彼處又請依止師受戒可得戒否佛答得戒者雖虧無適莫之德由難事緣若師如法者得戒問若比丘誘他沙彌將至異衆與受大戒犯何事彼衆知應聽否答若其師有非法事沙彌及將去者無罪若無非法將去者犯重壇上師僧犯捨墮昔有一長老比丘唯有一沙彌瞻視有一比丘輒誘將沙彌去此老比丘無人看視不久命終因此制戒不得誘他沙彌誘他沙彌犯重若有一比丘見他沙彌瞻視老病人教使捨去沙彌若去此比丘犯重釋誘引也相勸動也若比丘以言誘他人之沙彌將至異界之衆受大戒犯何事彼異界僧知是誘者應聽受戒否佛答若其沙彌之師有非法犯戒事者沙彌不犯越法罪將去者不犯重故云無罪若無非法事者將去者犯重此影沙彌之越法也壇上下答第二問謂彼異衆壇上師僧知者不應聽受戒若聽犯捨墮以慢佛語故昔有下引證誘事致令命終制戒犯重也若有下況也若有一比丘見他沙彌瞻視老病人教使捨去彼若去者此教捨比丘亦犯重況誘引也八受施事受施事品第八釋施布也散也與也謂比丘受領檀越施與飲食衣服臥具醫藥之事此施事有四種常住如律鈔云一常住常住衆僧府庫寺舍衆具花果樹林田園僕畜但得受用不通分賣故重言之二十方常住僧家供僧常食體遍十方唯局本處三現前僧得施物唯施此處現前僧故四十方現前如亡五彩輕物若未羯磨從十方僧得罪若已羯磨從現前僧得罪上二種名四方僧物後二種名現前僧物然比丘受請有許可佛無者何也律云佛默然受請者佛貪結已盡於食貪無染故默然受聲聞辟支佛貪結雖盡習垢猶在是故受請有許可又斷譏謗故若佛於食發言許可外道異見當言瞿曇沙門自言超過三界而故於食有貪佛現大人相故食是小事不以致言問比丘受檀越請四事供養所施物得分施人否答得釋若比丘已受檀越請與四事供養而所受物得分施他人否答得者以施他人顯其不貪是解脫事故問已受四事長請小小緣事出行得食外食得服外藥否答施主聽得釋長請者言長時受請不限止故小緣者貿易瞻望等緣食啖也取也言取四大力故得食者五噉食也服用也藥者黃連細辛等調理四大故若比丘已受四事長請有小小緣事出界外行若值修福者而比丘得食外食得服外藥否佛答若施主聽之皆得以普欲令人修福故影於不聽不得問他人欲施比丘物先問比丘有無比丘實自有以貪心欺彼言無他即施物犯何事答貪取犯捨墮妄語犯墮釋他施主人欲施比丘物而先問比丘有無比丘實自己有以貪心欺彼言無他施主即施物犯何事佛答言比丘貪心取犯捨墮以畜長財故妄語犯墮以有言無故問若衆僧食偏與上座上座得食否答若上座貪心犯捨墮釋上座者言受戒四十臘至長日時皆通稱也若衆僧食知食比丘偏與上座而上座得食否佛答若上座貪心取食犯捨墮以慢佛僧跋語故問比丘不病稱有患苦求索好食既得食之犯何事答犯重釋病者言風濕熱也好食者乳酪魚肉也若比丘不有病疾詐稱有患苦而求索施主好食彼即施之比丘既得食之犯何事佛答犯重以悲田誑欺取利故問不著三衣受食犯何事答犯捨墮釋受食者謂佛始成道食鹿女糜竟若有出家弟子著云何衣及食觀諸佛皆著淨衣褊袒坐受食一坐食我之弟子法亦如是欲作限礙能妨衆戒所以踞坐為淨衣故亦反俗流若比丘不著三衣受食犯何事耶佛答犯捨墮以慢佛語故問檀越適請二三人須衆唱否答須唱釋適者專也謂檀越適於僧中請二人或三人可須衆中唱否文云大德僧聽某檀越適請僧福田求願滅罪唱已差之赴也佛答須唱者以決衆心勿生犯僧次之念是別請也問大比丘羯磨分物時尼來界內應得分否答應得釋羯磨此云作法言比丘作為如教之法成辦分物之事謂大比丘羯磨分物時比丘尼來於界內應得分否佛答應得者以現前僧分物應得與尼非衣由尼亦是僧數故問有人寄物施一處僧物至後更有比丘來分時在座應得分否答打犍椎得不打不得釋謂有緇素之人寄物施一住處現前僧物至一住處後更有比丘來於界內分時在座此更來僧應得分否佛答若僧打犍椎得分以施物體通十方故不打不得者唯施此處現前僧故問比丘行道中婦人施物得受否答親里若相識得取釋謂比丘行於道路之中值有婦人施物可得受否佛答若是比丘父母六親鄉故鄰里及相知識得取受也明非親里不得受以律制非親里乞物故問比丘行道中比丘尼施物得受否答施僧得受非衆不得釋律制比丘不得於村中從非親里比丘尼受食食若比丘行道中有比丘尼施物得受否佛答施僧得受者以不失福田故非衆不得者以不存顧念彼之有無譏嫌即生故問供僧齊米僧去齊主得供後人得食否答打犍椎得食若不打食一飽犯棄釋謂檀越供養一住處僧之齊米僧伽已去而齊主得供後來僧人可得食否佛答後來僧人若打犍椎得食以有集衆無私取故若不打食一飽犯棄者即為盜僧物故問四月八日䞋物七月十五日本僧已去寺主取與後僧後僧分取者犯何事答打犍椎現在僧共分無罪若不打犍椎分犯盜釋四月八日者言生時大會也本僧者言大會時本受䞋物之僧後僧者言大會後之僧謂檀越於四月八日䞋至自恣日而本僧已去其界內寺主取與後僧此後僧未受䞋物而分取者犯何事耶佛答若界內打犍椎後僧與現在僧共分無罪若不打犍椎後僧不得取以僧未現在前故分者犯盜按律五事成盜一者他物二者他物想三者重物四者盜心五者離本處若一二事不犯重犯突吉羅偷蘭遮問白衣有貰䞋物本道人去與後人後人得受否答應取問主人本道人當來否答言永不來呪願取若言或來不得取取犯捨墮知取犯棄是僧物故釋貰假也借也謂白衣有貰借本界道人䞋物其白衣欲還本道人而本道人已去於界外又與後人此後人得受否佛答應取以不令在家用僧物故雖云應取必明問於白衣主人云其本借物道人當來此界否彼若答言永不來此界後人呪願取若言或來後人不得取是有主物故若取犯捨墮若知本貰䞋道人已亡而取犯棄以死後是四方僧物故問比丘治生得物施比丘衣食得受否答取衣犯捨墮窮厄無食處彼使白衣作可食治生道人若白衆言此物非我物是使人物若爾可食若主不白衆食犯墮二三人亦可白若道人施他人他人言是我物可食釋治生者言治世資生之業求利息故薩婆多毗婆沙云此販賣戒罪於一切波逸提中最為重者寧作屠兒不為販賣何以故屠兒正害衆生此販賣一切欺害不問道俗賢愚持戒毀戒無往不欺又常懷惡心設若居穀心恆悕望使天下荒餓霜雹災疫若居貯集餘物意常止望四方返亂王路隔塞夫販賣者有如是惡若比丘死更無販賣因是更聽羯磨取物此惡物設與衆作食衆僧不應食若作四方僧處不得住中若作塔僧不應作禮又云但佛作意禮凡持戒者不應受用此物也謂比丘為治世資生之業求得利物施與比丘衣食可得受否佛答取衣犯捨墮以貪慢心受不淨財故若於窮厄無食之處彼治生者使白衣作比丘可食或治生道人於窮厄無食處若白衆言此物非我物是使人物若爾可食若不白衆者衆食犯墮若二人三人亦可白也若治生道人以物施他比丘他比丘人言是我物比丘可食以施屬他人非不淨物故問比丘得出物否答不得犯捨墮釋謂比丘可得出物入利息否佛答不得者以比丘初捨俗纍之家又戒禁衣鉢之餘分寸不畜故若出物犯捨墮問長受百日請中間得受他一食二食否答施主聽得不聽不得釋謂比丘長受檀越百日之請而中間得受他施主一餐之食二餐之食否佛答初請施主聽者得食若不聽者不得若食之有罪以違自言故問比丘食或含一口飲吐之取一摶飯棄之犯事否答犯捨墮釋摶食者言手團曰摶熏聞云其義則局如漿飯等不可摶故後譯經者皆云段食者段謂形段香味觸三塵為體入腹變壞資益諸根故言段食謂比丘受食或含一口之飲吐之或取一摶之飯棄之可犯事否佛答犯捨墮以比丘飲水食飯尚愧寡德難消若不存五觀三匙故吐棄者犯捨墮問乞食長得與人否答先無貪心取長得施衆生若無衆生舉著樹頭有衆生噉好若無明日還自受水取食不得棄以信施重故所以還得自取者以更無主故如單越取食法釋長多也言乞食長多也謂比丘乞食長多可得與他人否佛答先無貪心取長者得施衆生影於有貪心取長不得施以長施與若無衆生時如何當舉著樹頭有衆生噉好若樹頭無衆生噉者明日還自受水取食不得棄捨以信施最重所以得取者以更無施主故如北洲取食法無人授與故施設論云北洲人如何無我所執耶答謂以衆生數多境界廣大所受境界咸皆悅意平等無差故無我所執問主人殷勤得長受請否答若其處得行道無難無短乏得往釋謂施財主人殷勤長請比丘供養而比丘可得長受施主所居之處請否佛答若其施主所居處可得行道無八難因緣四事無有短乏得往赴也問主人請食得遣人代否答主人意無在得若主嫌代去犯捨墮釋謂施主人請比丘食而比丘既受請已或有別緣恐失福田可得遣人代受食否佛答若主人意無定在者得代若主人有在嫌代去者犯捨墮以有貧富捨貧故問鬼子母食可食否答呪願然後可食釋鬼母食者謂佛授鬼母戒不冷血食遂教比丘每日午施食謂生臺傍鬼子母食比丘可食得否佛答凡人施與即屬其主不宜擅取若欲食時先須呪願云所為布施者必獲其義利若為樂故施後必得安樂此呪願若食前即同乞化或食已即呪願之詞作是願已然後可食問主人施比丘牛馬奴供食直得取否答得取用不得賣弓刀一切凶器仗皆不得受釋謂主人欲供比丘食或無資財而施比丘牛馬奴以供食直可得取否佛答比丘以慈為主得取用之但不得賣恐有殺害故若彼以弓刀等仗皆不得受且是損害衆生之器亦發人防忌心故問人自出物供齊齊竟去餘物後僧來得食否答打犍椎得不打犯盜釋謂有人自出財物供一住處僧伽之齊齊既已竟而僧已去其齊所餘之物後有十方僧來可得食否佛答若打犍椎後來僧得食若不打犍椎食犯盜以私取故問比丘共盤食他分犯何事答若問聽無罪不聽取食犯墮若不問亦犯墮所以不犯者以共仰手故受釋謂比丘彼此共於一盤食啖他分為犯何事佛答若共盤時應問云汝食否彼答云我不食聽汝食之所以無罪若云汝勿動我分是不聽故取食犯墮不問亦犯墮以非儀觸惱他故所以不犯者以共仰手故受問比丘乞前人問好比丘非答是得物至犯何事答實好言好犯墮不好言好犯棄釋好者言四果四向禪定解脫等非者言破見戒威儀淨命謂比丘乞求檀越而前施主人問好比丘非耶比丘答是得物至犯何事佛答若比丘實好言好犯墮以上人法向說而取利故不好言好者犯棄以實無所知自稱言得上人法故問比丘一切長物施人言我後須還自取得爾否答得與可信者然後更語一人我物施某比丘若取還語不得輒取釋謂比丘一切長多之物展轉布施餘人言我後須還而作施比丘自取得爾否佛答若自取得與可信者不失其約故然施已後更語一人我物施某比丘以為證者若欲自取還語證者不得輒取以悉故意妄言不與也九疾病事病事品第九釋疾患也病苦也又疾甚曰病謂比丘或有疾病之時受持衣鉢等云為之事開遮重輕得不得故問比丘病得離鉢食否答重病得小病不得釋病者言比丘得於風寒熱四大不調也鉢者梵語鉢多羅此云應量器言體色量皆如法故此乃諸佛之標幟有斷除邪妄之功能故制比丘持也謂比丘有病得離鉢食否佛答重病得以不能坐用故若小小病緣猶能坐持不得離鉢食若不鉢食犯墮問比丘病三衣不持犯何事答大困無所識知得有覺知不得釋衣者乃羣戒之總首實表法之初章內則頓悉乎諸心外則長辭於俗務誠沙門之幖幟入道之通規夫然者可得離乎謂比丘疾患病苦三衣不持犯何事佛答若疾病大困無所識知者得若猶有覺知不得不持衣若不持衣犯墮問看病人不語病者私用錢與他病人作食湯藥犯何事答若用五錢犯棄若後語病者歡喜不犯若病人恚不償犯棄釋謂看視病比丘之人不語告病者私用取錢與他有病之人作為飲食湯藥犯何事耶佛答若私用五錢犯棄以不與取故奪病人外命即殺緣故若先不語後方語所看病歡喜不犯以無盜奪意也若所看病人聆知而即恚者應償不償者犯棄以同盜取故問為病故主人日供一百錢五十便足餘者得與餘病者作食否答病者自與便得釋檀越為病僧故其主人每日供用一百錢五十便足而餘者看病人得與餘病者作為食否佛答若病者自與便得若看病者與同上此不同前問者以有餘殘故問病比丘無人看比丘得與作食否答若山野無人處日中不得往還得作七日先淨薪米受取得作釋作食者言比丘不自熟食故淨薪米者言先比丘說淨也謂病比丘無親識人看視而比丘可得與作食否佛答若山野無人之處日中不得往還者得作七日雖開此時猶先說淨文云大德一心念我比丘某今為無人處疾病因緣此薪米作七日食為經宿服故今於大德邊受然後看病者取得作食也明有人處不得也問病人須酒一升二升下藥可與否答若師言必瘥得和藥服不得空服釋酒者乃無明之藥昏性亂神酒毒頗甚增長愚癡故律誡飲升登也言十合為升謂登合之量也謂病比丘須酒一升二升下與藥內食比丘可得與否佛答若醫師言用酒必瘥得和藥服以和藥故無有酒味不得無藥定酒而服若空服者犯墮問比丘病得服氣否答不得同外道故釋謂比丘四大之中或有病緣為當服藥可得服氣否佛答若比丘風寒熱病可宜藥治不得服氣同於吞飲日月精氣服虹飲霧之外道故問比丘腫病得使唾呪否答得釋腫者㿈也鍾也言寒熱氣㿈鍾聚也此腫病屬風大不調故謂比丘腫病為宜服藥使氣通融教有呪水可得使人唾呪否佛答得者以病之緣起顛倒而生呪是無為能消妄想故云得也故灌頂經云以無蟲水呪一百八遍與彼服食所有病苦悉皆消滅問比丘病困或缺衣鉢施衆或賣用作福德犯何事答若更得斃故即受得無有犯捨墮釋衣鉢者乃利生之威服助道之要緣晝夜恆持如鳥二羽似車二輪無攝衣界不得一宿離身一尺之地若離即犯捨墮謂比丘病困或缺三衣及鉢以施衆而修善或賣用作福以消愆不同故離為犯何事耶佛答若缺賣衣鉢更得斃故即受可得也若缺賣已無有補者犯捨墮以破戒祈禳慢佛語故十死亡事死亡事品第十釋死者終也亡者盡也言比丘死亡終盡也經云生者新諸根生死者故諸根滅事者即比丘死亡分衣哭泣衣棺葬埋等事故曇無德部云分亡者衣法以出家人同遵出離身行所為莫不皆是僧法所攝故身亡已後所有資生皆屬四方僧義同非時僧得施法又僧得施其用有二一者隨處二者隨人故非時僧得施從施主為定亡比丘衣物據輕重為判重者隨即入住處輕者僧作羯磨分問亡比丘物都不打犍椎不羯磨而分犯何事界裏一人以上盡得打犍椎羯磨若不羯磨而打犍椎亦不羯磨盡犯棄所以爾者亡比丘物盡屬四方僧故不得輒分若界外五人以上得羯磨分不打犍椎以無界故四人已下不得羯磨若分犯棄當齎詣僧中若自取齎去至異衆初入界不犯出則犯棄如是復至餘衆一出界一犯棄弟子持師物去亦爾釋都總也打犍椎者言集僧之法也羯磨者言此白二作法是索大衆忍可分物無多少不平故皆默然分物者言亡僧之物屬四方僧故增輝記云佛制分衣本意為令在者見其亡物分與衆僧作是思念彼既如斯我還若此因其對治令惡求故今不能省察此事翻於唱賣之時爭價上下喧呼取笑以為快樂悅之甚矣仁者宜忌之又毗婆沙論問亡比丘衣鉢等云何得分答彼於昔時亦曾分他如是財物今時命過他還分也謂亡故比丘所有輕重之物衆僧都不打犍椎及羯磨而分犯何篇事佛答二種分法之重也一者若界裏一人以上盡得打犍椎羯磨分以有界集僧故一人者毗尼母論云一人相應法者二人共住一人死在者取衣口言此某甲亡比丘物應屬我三說以上者即二三人衆多法也毗尼母云四人共住一人死應展轉分捨衣已賞勞法住二人口和付言大德僧聽我等持是亡某甲比丘物衣鉢等與某甲看病比丘三說集律本云應彼此三語受共分應言二大德僧聽此亡比丘某甲衣物應屬我等三說若界裏一人以上不作心念羯磨衆多人人羯磨僧法羯磨而打犍椎或不打犍椎亦不作如是羯磨盡皆犯棄所以下徵釋以亡物盡屬四方僧故須打犍椎羯磨不得輒分也二者若界外五人以上得羯磨分不打犍椎以無界故若輕物現前僧分若重物付近遠有僧法寺也四人以下不得羯磨分若分犯棄以非五人僧故若然者物當云何此物當齎至近處有僧法僧伽藍中分之若又自取賫去至異衆初入界不犯出則犯棄以盜異衆之物故如是復至餘衆一出界一犯棄以皆盜現前僧物故弟子持師物去亦爾也問比丘亡弟子不持師物與衆輒自分處供養僧僧可食否答其弟子先知法者有罪僧不打犍椎不羯磨而食犯捨墮釋輒自分處者言師心制法不如法律之教也謂比丘亡後其弟子不持師物與衆打犍椎羯磨分之輒自分處供養衆僧既乖律法僧可得食否佛答其亡者弟子先知羯磨法等自分有罪即捨墮也僧應打犍椎羯磨食若僧不打犍椎羯磨食者犯捨墮罪問若師亡僧羯磨分物弟子應得分否答應得即是僧故釋若比丘之師亡僧作羯磨分物其亡者弟子應得分否佛答僧分物時亦應得分以弟子即是現前僧故問僧亡更無餘僧唯有弟子或五戒十戒得羯磨分此物否答即是僧故得分但打犍椎羯磨不打不羯磨不得釋謂界內之僧已亡更無餘僧在界唯有弟子或五戒十戒此亡物應僧分之不知弟子可得羯磨分物否佛答雖五戒十戒弟子即是僧故所以得分故律云十戒等即是名字比丘現前僧也但要打犍椎羯磨分之若不打犍椎不羯磨不得分以盜僧物故問病者無常供病餘物後人得與餘病者否答此是僧物不得輒與直五錢犯棄釋無常者正理論云本無今有暫有還無故名無常謂有病者無常供病所餘之物後人可得與餘病者否佛答此亡餘物即是僧物不得輒自與之若直五錢者犯棄若減五錢等即三聚六聚也問師徒父母兄弟死得哭否答不得一舉聲犯捨墮可小小泣涕而已釋哭者哀聲也大聲曰哭泣涕者細聲有涕曰泣而已者結盡之辭謂比丘之師及徒與俗中父母兄弟死亡可得哭否佛答不得以僧不應同俗故若一舉聲犯捨墮但可小小泣涕而已故輔教篇終孝章云父母之喪縗絰則非其所宜以僧服大布可也凡處必與俗之子異位過斂則以時往其家送葬或扶或導三年必心喪淨居修我法贊父母之冥過喪期唯父母忌日孟秋之既望必營齊講誦如盂蘭盆法是可謂孝之終也昔者天竺之古皇先生居父之喪則肅容立其喪之前如以心喪而略其哭踊也大聖人也及其送之或舁或導大聖人也夫目犍連喪母哭之慟致饋於鬼神目犍連亦聖人也尚不能泯情吾徒其欲無情也故佛子在父母之喪哀慕可如目犍連也心喪可酌大聖人也居師之喪必如喪其父母而十師之喪則有隆替也唯稟法得戒之師心喪三年可也法雲在父母之憂哀慕殊甚食不入口纍日法雲古之高僧也慧約殆至人乎其父垂死與訣皆號泣若不能自存然喪之哭雖教略之蓋欲泯其愛惡而趣清淨也苟愛惡未忘遊心於物臨喪而弗哀亦人安忍也故泥洹之時其衆撫膺大呌而血現若波羅奢華蓋其不忍也吾徒臨喪可不哀而泣涕乎又西域記云出家僧衆制無號哭父母之喪誦念酬思追遠慎終實資冥福如是則知在家當哭也問或比丘死時在羯磨時不在或死時不在羯磨時在各應得分否答及羯磨盡得死時在羯磨時不在不得釋謂或比丘死時在羯磨時不在或死時不在羯磨時在如上二種在與不在各應得分否佛答若死時不在及羯磨盡者得分若死時在羯磨時不在不得分又佛聽乞耳復有所不應分物何者存在時所有經律應分處與能讀誦者若不及分處現在僧應與能誦者此物不應分賣也問比丘死後人與買棺木衣服葬埋與者犯何事答曰白僧與泥洹僧僧祇支自覆自餘應入僧師物一切不得埋埋過五錢犯棄若弟子私物得亡者知法已得分處分者無罪釋棺者周尸曰棺泥洹僧此云裙裙接也連接而幅故僧祇支此云覆膊掩腋衣謂比丘死已後作法人將死者物與買棺木等葬埋犯何篇事佛答若彼死已應白僧與泥洹僧僧祇支自覆其身自此之餘應入僧伽何者以師物一切不得埋埋過五錢犯棄以盜四方僧物故若弟子私物感師之德隨意而過得與亡者若作法人知羯磨法已得分是以處分者無罪問父母諸親死比丘與辦衣棺木埋否答不得若父母亡日若病無人供養乞食與半若自能繩線不得與食犯捨墮與衣犯捨墮況復棺木葬埋耶釋若人父母諸親死比丘與辦衣棺木埋否佛答不得以信心之施俗難消故若父下引親況明若比丘父母亡盡之日若或病緣無人供養宜乞食與半若父母自能繩線不得與半若與食衣二皆捨墮自親衣食尚然況人父母與衣棺木也問病者無常衣鉢先與看病者竟不羯磨看病者賣為飯僧得食否答衆未得羯磨食衆犯捨墮若看病不知法已作羯磨得食若未作衆當語法釋先與者言未亡先與酬勞也竟不羯磨者言看病者於亡者打犍椎羯磨竟不白僧作賞德白二羯磨也謂病者無常以衣鉢先與看病者此人見僧作法竟不白僧作法後賣為飯僧僧可得食否佛答若亡者作法之衆此衣鉢未得羯磨之食衆若食之僧犯捨墮若看病者不知佛法仍須僧作賞德法與之若衆已作羯磨衆可得食若比時現前僧未作賞德羯磨法欲受食之衆當語看病者法作已可食問比丘借人物前人死得還自取否答一切不得自取取犯突吉羅白衆衆還得取衆不還犯突吉羅若衆不與強取犯捨墮釋謂比丘借與人之物而前所借物人已死可得還自取否佛答若公私多少一切物皆不得自取若取犯突吉羅以人死物皆屬僧應白取故若白衆衆還得取衆若不還犯突吉羅以佛言僧分衣時應問誰負病人物病人負誰物故若衆不與而比丘強取犯捨墮以堅執我所慢佛言教故問比丘得為亡師起塔否答自物得用師物作不得釋起塔者如佛四處起塔俾人信敬供養生福故若比丘師故追拔濟之恩得為亡師起塔否佛答言比丘自物得作塔婆以表孝敬心故若師物不得作是僧物故問比丘得向師冢禮否答得難曰生是我師已死尚非比丘惟枯骨而已何由向禮答若佛在世應供養恭敬泥洹後亦是枯骨何以供養耶師生以法益人後亦恭敬禮拜有何過也釋禮者言比丘事師應朝晡問訊存禮數故師冢者按經云釋子死之所歸即涅槃為果故又月上女問舍利弗言佛弟子當住何處答當住涅槃以比丘始出家名求寂洎受戒已名塢波三般那唐言近圓此二皆涅槃稱故若比丘欲禮師者為當禮於涅槃可得向師冢禮否佛答得禮者以念師恩故難曰言此是佛預設以防或者之難令比丘答難之辭或曰生則是我師當禮既死之後尚非比丘之形唯存枯骨而已何由向禮答若佛在世應供養恭敬泥洹之後亦是枯骨亦勿向禮何以人皆供養耶若謂佛雖滅法恩難盡故師生以法益人後亦恭敬禮拜以感慈訓之恩有何過也問分物時羯磨已訖更有僧來得分否答若羯磨訖不與無咎若及後羯磨猶故得分釋謂僧於界內分物之時羯磨已訖更有僧來可得分否佛答若更來僧雖云現前而羯磨已訖不與無咎以如法事竟故若及後索欲羯磨猶故得分以如法事未終故此影單白羯磨得分也
